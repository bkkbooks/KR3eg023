body:
  text: 卷之四汗法時疫貴解其邪熱而邪熱必有著落方著落在肌表時非汗則邪無出路故汗法為治時疫之一大法也但風寒汗不厭早時疫汗不厭遲風寒發汗必兼辛溫辛熱以宣陽時疫發汗必兼辛涼辛寒以救陰風寒發汗治表不犯里時疫發汗治表必通里其不同有如此故方疫邪傳變出表時輕者亦可得表藥而汗散若重者雖大劑麻黃羌葛亦無汗也以伏邪發而未盡之故亦有不用表藥而自汗淋漓邪終不解者蓋此汗緣裡熱鬱蒸而出乃邪汗非正汗也必待伏邪盡發表裡全徹然後或戰汗或狂汗而解所謂汗不厭遲者此也辛涼發汗則人參敗毒散荊防敗毒散之類是辛寒發汗則大青龍九味羌活大羌活之類是發表兼通里則吳氏三消飲六神通解散防風通聖散之類是更有不求汗而自汗解者如裡熱閉甚用大承氣以通其里一不已而再再不已而三直待里邪逐盡表裡自和多有戰汗而解此不求汗而自汗解者一又如裡熱燥甚病者思得涼水久而不得忽得痛飲飲盞落枕而汗大出汗出即解此不求汗而自汗解者二又如平素氣虛屢用汗藥不得汗後加人參於諸解表藥中覆杯立汗凡不求汗而自汗解者三又如陰虛及奪血枯竭之極用表藥全然無汗用大滋陰潤燥生津藥數劑而汗出如水此不求汗而自汗解者四總之疫邪汗法不專在乎升表而在乎通其鬱閉和其陰陽鬱閉在表辛涼辛寒以通之鬱閉在裡苦寒攻利以通之陽亢者飲水以濟其陰陰竭者滋潤以回其燥氣滯者開導血凝者消瘀必察其表裡無一毫阻滯乃汗法之萬全此時疫汗法理不同於風寒謹撮諸汗證詳列於下發熱惡寒無汗頭項痛背痛腰痛肩臂痛膝脛痛周身肢節痛下法時疫下法與傷寒不同傷寒下不厭遲時疫下不厭早傷寒在下其燥結時疫在下其鬱熱傷寒里證當下必待表證全罷時疫不論表邪罷與不罷但兼里證即下傷寒上焦有邪不可下必待結在中下二焦方可下時疫上焦有邪亦可下若必待結至中下二焦始下則有下之不通而死者傷寒一下即已仲景承氣諸方多不過三劑時疫用下藥至少三劑多則有一二十劑者時疫下法有六結邪在胸上貝母下之貝母本非下藥用至兩許即解結邪在胸及心下小陷胸下之結邪在胸脅連心下大柴胡湯下之結邪在臍上小承氣湯下之結邪在當臍及臍下調胃承氣湯下之痞滿燥實三焦俱結大承氣湯下之此外又有本質素虛或老人久病或屢汗屢下後下證雖具而不任峻攻者則麻仁丸蜜煎導法豬膽導法為妙下法之輕重緩急總以見證為主詳列於後急下證舌乾舌卷舌短舌生芒刺舌黑齒燥鼻如煙煤胸腹滿痛狂昏沉發熱汗多身冷厄逆當下證舌黃譫語善忘多言協熱利頭脹痛煩躁緩下證舌淡黃苔微渴大便閉小便黃赤潮熱齒燥以上諸證緩下者不下則必漸重而為當下證當下者緩下則必加重而為急下證急下者失下則雖下之多不通而致結熱自下逆上脹滿直至心下又逆上透過膈膜有至胸滿如石咽喉鋸響目直視反白或睛盲瞳散耳聾九竅不通雖有神丹莫之能救矣外更有蓄血蓄水諸下法前已散見諸條茲再詳列以便翻閲蓄水證小便不利大便微利蓄血證小便自利大便黑他若蓄水蓄血在胸脅不當下者此不贅清法時疫為熱證未有不當清者也其在表宜汗使熱從汗泄汗法亦清法也在裡宜下使熱從下泄下法亦清法也若在表已得汗而熱不退在裡已下而熱不解或本來有熱無結則惟以寒涼直折以清其熱而已故清法可濟汗下之不逮三者之用可合而亦可分時疫當清者十之六七則清法不可不細講也凡清熱之要在視熱邪之淺深熱之淺者在營衛以石膏黃芩為主柴胡葛根為輔熱之深者在胸膈花粉知母蔞仁梔子豆豉為主熱在腸胃者當用下法不用清法或下而兼清亦可熱入心包者黃連犀角羚羊角為主熱直入心臟則難救矣用牛黃猶可十中救一須用至錢許少則無濟非若小兒驚風諸方每用分許即可有效當清諸證詳列於下熱在營衛證身熱汗自出不惡寒反惡熱身重頭面項紅腫周身紅腫斑疹鼻孔干唇燥煩躁遺尿舌苔白熱在胸膈證身熱反減渴嘔咳咽乾譫語多言胸前紅腫舌苔厚白熱在腸胃證便血便膿血余悉見下證條中熱在心包及心證狂昏沉多睡舌黑和法寒熱並用之謂和補瀉合劑之謂和表裡雙解之謂和平其亢厲之謂和所謂寒熱並用者因時疫之熱夾有他邪之寒故用此法以和之也凡方中有黃連與生薑同用黃芩與半夏同用石膏與蒼朮同用知母與草果同用者皆是所謂補瀉合用者因時疫之邪氣實人之正氣虛故用此法以和之凡方中有參耆歸芍與硝黃枳朴同用者是所謂表裡雙解者因疫邪既有表證復有里證故用此法以和之凡方中有麻葛羌防柴前與硝黃梔芩苓澤枳朴合用者是所謂平其亢厲者因時疫之大勢已去而餘邪未解故用此法以和之或用下法而小其劑料緩其時日或用清法而變其湯劑易為丸散者皆是凡此和法雖名為和實寓有汗下清補之意疫邪尤有宜和者凡熱不清用清涼藥不效即當察其熱之所附麗蓋無所附麗之熱為虛而無形之氣如盛夏炎蒸遇風雨即解故人身之熱氣清即退有所附麗之熱為實而有物如洪爐柴炭雖沃以水尤有沸騰之憂必撤去柴炭而熱始退凡熱之所附麗非痰即滯非滯即血徑清其熱不去其物未能有效必視其附麗何物於清熱諸方加入何藥效始能捷此和法之精微神變者也宜和之證詳列於下寒熱往來盜汗口苦咽乾頭眩舌強渴胸脅滿耳聾小便黃嘔吐下利而心下痛口乾舌強而惡寒大小便閉而寒熱痞滿而悸二便自利而舌苔形體瘦損而舌苔凡此表里虛實寒熱相兼者不可枚舉引此數端可以類推其有似和而實非和證者詳後辨似條補法時疫本不當補而有屢經汗下清解不退者必待補而愈此為病藥所傷當消息其所傷在陰在陽以施補陰補陽之法疫邪為熱證傷陰者多然亦有用藥太過而傷陽者則補陰補陽又當酌其輕重不可偏廢凡屢經汗下清和而煩熱加甚者當補陰以濟陽所謂寒之不寒責其無水者是六味四物生脈養榮諸方酌用屢經汗下清和熱退而昏倦痞利不止者當補陽所謂養正以卻邪者是四君異功生脈六君理中建中附子等方酌用諸證詳後當補陰證舌乾無苔舌黑無苔耳聾目直視目不明服清涼藥渴不止服清涼藥煩熱加甚服攻下藥舌苔愈長服攻下藥舌苔芒刺燥裂愈甚服清涼藥身熱愈甚身體枯瘦用利水藥小便愈不通腰膝萎軟周身骨節痛不可移動多睡當補陽證多冷汗汗出身冷經日不回小便清而多大便利清穀嘔吐用清熱開導藥愈甚自利用清下藥愈甚痞滿外此更有四損四不足三復證當補詳見後四損大勞大欲大病久病後為四損氣血兩虛陰陽並竭復受疫邪正虛則邪入愈深邪深則傳化難出汗下傷正而正脫補助郁邪而邪錮多不可治然補瀉兼施間有愈者有補瀉合用之法有先補後瀉之法有先瀉後補之法凡人參敗毒散人參白虎湯黃龍湯竹葉石膏湯皆補瀉合用之法也先用補劑後施汗下先補後瀉之法也先用汗下後施補劑先瀉後補之法也當詢病之來路斟酌施治尤當審現在之證若純見實證亦不可以疑似之見誤人大凡周身俱見大實大熱之證而一二處微見虛象則吃緊照顧其虛周身俱見虛象而一二處獨見實證則吃緊斡旋其實此治病之權衡也若夫汗之而表證愈增如頭痛身痛更甚之類清下而里證愈增如煩渴痞滿更甚之類則大虛有盛候也急宜補之毋疑既辨其證尤當細辨其脈凡遇脈之浮候盛大者須謹察其沉候有無力處六部脈皆盛者須謹察其一部有獨無力處果得其一部一候之真無力便可略其諸部諸候之假有餘從而施治有獨見若神之妙夫既詢得其來路之大概又察得其輕重之確憑再加之脈理精詳則燭照無遺矣其損證之狀甚多當參後四不足條看四不足四損由人事四不足由天稟四損在暫時四不足在平素然四不足亦有由四損而來者不可以四損之外便無不足四不足者氣血陰陽也氣不足者少氣不足以息語言難出也感邪雖重反不成脹滿痞塞凡遇此證縱宜宣伐必以養氣為主血不足者面色萎黃唇口刮白也感邪雖重面目反無陽色縱宜攻利必以養血為主陽不足者或四肢厥逆或肌體惡寒恆多泄瀉至夜益甚或口鼻冷氣受邪雖重反無發熱苔刺燥渴凡遇此等證縱欲攻利清熱必先之以溫補待其虛回實證全見然後以治實之法治之陰不足者自然五液枯乾肌膚甲錯感邪雖重應汗無汗應厥不厥遇此等證縱宜攻利必先之以養陰待其氣化津回邪多不治自退設有未退酌用清利攻利若早其病益甚以上四不足合前條四損總不可正治其邪必以養正為要先服養正藥待其實證悉見方可攻邪若服攻邪藥虛證復見仍當調補其虛養正以和邪去邪以安正互相加減迭為進退直待邪盡去而正不傷方為善治三復三復者勞復食復自復也勞復者大病後因勞碌而復也不必大費氣力即梳洗沐浴亦能致復復則復熱諸證復起惟脈不沉實為辨輕者靜養自愈重者必大補以調其營衛和其臟腑待其表裡融和方愈誤用攻下清涼必致不救安神養血湯主之若因飲食過多而復者舌苔必復黃輕者損谷自愈重則消導始愈若無故自復者乃伏邪未盡也當問從前所見何證服何藥而解今仍用前藥以滌其餘邪則愈時疫復證有復至再三者屢復之後必兼四損四不足證宜參前條加減進退之法治之辨似凡病皆以虛實寒熱四字為大綱時疫何獨不然但虛實寒熱之真者易辨似者難辨前所列時疫表里諸證皆實邪熱邪而實熱中亦有虛寒四損四不足皆虛邪寒邪而虛寒中亦有實熱余於逐條下已細辨之矣然有實證似虛虛證似實熱證似寒寒證似熱尤不可不細辨故復通論而詳述之所謂實證似虛者即以表證論之頭痛發熱邪在表也其脈當浮證當無汗而反自汗脈無力用發表藥而身反疼痛則似虛矣故人惑於多自汗而誤用桂枝湯者有之惑於脈無力而引仲景太陽篇發熱惡寒脈微弱為無陽而誤用建中湯者有之惑於身疼痛而引仲景若不瘥身體疼痛當溫其里誤用四逆湯者有之不知此等證在時疫中皆在表實證之似虛者也其自汗者疫熱自里蒸出於表非表虛也其脈無力者熱主散漫散漫則脈軟非比寒主收斂而脈緊也身體反疼者伏邪自里而漸出於表非比陽虛不任發表也此表證之實證似虛者也又以半表半裡論之寒熱往來胸脅滿邪在半表半裡也其脈當弦其口當渴而有脈反沉口不渴者則似寒矣故人惑於脈沉而以胸脅滿為太陰口不渴為內寒而誤用理中者有之不知此證在時疫中皆半表半裡熱證之似寒者也其脈沉者邪伏在募原而未出表故脈不浮非陽虛也其不渴者邪未傳變未入胃腑故不能消水非內寒也此半表半裡之似寒者也又以里證論之口燥咽乾不得臥邪在裡也其脈當滑其身當熱其便當結按滑當作洪經云滑者陰氣有餘也主痰飲宿食吐逆諸證洪為氣血燔灼之候主煩主咽乾表裡俱熱二便澀傷寒陽明經病而脈反沉微澀弱身反四逆厥冷大便自利則全似虛冷矣人惑於脈之沉微弱澀而用參耆者有之惑於厥逆而用桂附者有之惑於自利而用參朮乾薑者有之不知此等證在時疫皆裡熱之似寒也裡實之似虛也其脈沉微弱澀者乃邪熱結於腸胃氣不達於營衛也其身反厥冷者邪熱結於裡結於下氣不達於外通於上也其自利者乃熱結旁流也此里證之實證似虛熱證似寒者也總之時疫為熱因與風寒之寒因大異故脈證雖有似虛似寒之時而一辨其為時疫則屬邪自外至邪氣盛則實大都反見虛寒假象明眼人不當為所惑也所謂虛證似實者即以表證論之頭痛發熱身疼痛自汗脈浮大邪在表也而屢用表散清涼藥不惟不減其證轉甚者非藥力之不到乃正氣不能傳藥力達表陰液不能隨陽氣作汗也此邪在表時虛證之似實者也氣虛者加參耆於表藥即汗陰虛者加潤劑於表藥即汗若不知其氣血之兩虧而宣表不已勢必暴厥而成脫證矣更以半表半裡論之胸脅痛耳聾嘔吐如瘧狀脈弦邪在半表半裡也而屢用和解消導藥不惟不減其證更加者非藥力之不到乃中焦膽胃傷而氣不運肝木傷而火燥逆也此疫邪在半表半裡時虛證之似實者也必合四君六君於和解藥中合四物於清解藥中始能戰汗而解若更消導清解不已必至胃氣絶而死更以里證論之舌苔黃黑裂燥亡刺胸腹脅臍硬痛大小便閉六脈數大邪在裡也而屢用攻利藥或總不得利或利後更甚非藥力之不峻乃正氣不能傳送腸胃血液不能滋潤腸胃也氣虛者助氣以資傳送血枯者養陰以藉濡滑氣行津化方得通利此疫邪傳裡時虛證之似實者也若不知其虧竭而恣意攻利必昏沉萎頓而死總之藥不中病則傷正氣傷其下則正氣浮越而上逆傷其中則正氣解散而外張脈證雖有似實似熱之時而一詢其來路若治之太過則屬氣從內奪正氣奪則虛明眼人不當為所惑也夫一證而虛實互異用藥稍訛而生死攸分將以何者為辨證之把柄乎曰以開卷所列氣色神脈舌苔辨其是疫與非疫以曾經誤治與未經誤治辨其時疫之為實為虛則得其大綱更細玩前所列各證條分縷析之詳則得其細目則似是而非之證斷不能惑矣余於前各條下每證已細辨其虛實而此復重言以通論之者正以前散見於諸條恐讀者略過故復總論以提撕其為吃緊處也至若寒證似熱則傷寒諸證有之時疫絶無故不論及云遺證屬病後不表里證發腫時疫大勢已平寒熱已解而面目肢體浮腫有食滯中宮水停心下氣復未歸三種當分別以施治食滯中宮者乃病後脾胃大虛不能消穀病者胃中枯燥偏欲多食食停心下臍上則水不得上輸於肺肺亦不能通調水道下輸膀胱故溢於肢體而為浮腫其證以心下臍上有硬處按之則痛為異小便或利或不利當用平胃散加枳實山楂麥芽萊蔔子青皮神麯為主硬處消則腫自愈或加苓澤兼利水亦可水停心下者乃脾虛不能消水也與食滯異者心腹無硬痛小便不利也用苓澤車前木通之類利其小便而愈氣復未歸者吳又可所謂病後氣復血未復氣無所歸故作腫也不可治腫調其飲食節其勞役靜養自愈其異於停水食滯者水停身重小便不利氣腫身輕小便自利食滯腹中有結氣腫腹中自和也發頤時疫愈後有發頤者乃餘熱留於營血也速以解毒清熱活血疏散為主誤則成膿不出而牙關不開咽喉不利多不能食而死毒內陷而復舌燥神昏亦死出膿後氣虛血脫亦死故宜早治也古方以普濟消毒飲為主發在耳後以柴胡川芎為君在項下以葛根為君在項後或巔頂加羌防此證不可輕補於未潰之先補早必成膿尤不可純用寒涼於將發之際恐閉遏而毒不得發故必兼疏散為要外治以蔥水時時浴之發瘡時疫愈後發瘡者極多餘熱淫於肌肉也多服清涼養氣血藥自愈發痿時疫愈後四肢不能動移者熱傷筋脈也吳氏諸養榮湯酌用輕者粥食調理自愈索澤時疫愈後身體枯瘦皮膚甲錯者熱傷其陰也養陰為主吳氏諸養榮湯酌用亦有粥食調理自回者發蒸時疫愈後有發骨蒸如勞瘵者乃餘熱留於陰分也不可以其羸瘦而遽用虛損門治法必察其六府有結邪則仍攻其邪為主次察其經絡有壅瘀則仍通其壅瘀為主次察其氣道有痰涎則仍利其痰涎為主數者俱無然後以清熱為主或無邪而陰傷方可純用養陰之藥或分其餘邪之輕重虧損之多少而兼用養陰清熱藥進退加減以和之更妙婦人婦人時疫悉與男子同惟當經期則治法略異以其關乎血室也凡遇感疫值經期者治法必兼少陽以少陽與厥陰為表裡厥陰為血室血室一動邪必乘虛而犯之須分適來因受病而止適來受病而自行適斷而受病三種則虛實自見凡經水適來而受疫氣遽止者必有瘀血要再察其脅腰少腹有牽引作痛拒按者必以清熱消瘀為主小柴胡加赤芍延胡桃仁歸尾丹皮凡經水適來而受疫氣疫病雖發而經水照常自行者不必治其經血但治其疫邪而病自愈蓋病本未犯血室故經血自行如常也仲景所謂勿犯胃氣及上二焦必自愈者正指此非謂總不用藥也凡經水適斷而受邪者經行已盡則血海空虛邪必乘虛而陷入血海若見腰脅及少腹滿痛者大柴胡湯加桃仁赤芍逐其血室之邪始愈凡婦人受疫但見晝日明瞭至夜譫語即當詢其經期以防熱入血室之漸妊娠妊娠感時疫須治之於早則熱不深入而傷胎當汗當清之證當速治不待言當下之證尤不可遲若因妊娠忌下傷胎之説因循略遲則胎受熱蒸而反易墜一見里證速下其熱其胎反安然無事蓋有病則病受之內經所謂有故無殞者於此見之此歷驗不誣者妊娠受疫當下失下至於舌黑腰痛少腹下墜至急則其胎多死腹中自欲墜矣此時下亦墜不下亦墜然下之胎墜母猶可救十中二三不下則母無生理胎亦不能獨存同一墜胎而此善於彼當明言於病家而後施治下藥雖三承氣皆可用惟芒硝當慎以其專主傷胎非大實大熱大燥不可試也小兒小兒受時疫悉與大人同而時見驚搐類於驚風誤治多死用大人治疫清解諸法減小劑料以治之則愈小兒不能言遇當下證既不知其譫妄復難驗其舌苔則當驗其唇唇赤而燥即是下證此幼科之要訣也
