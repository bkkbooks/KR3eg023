body:
  text: 卷之二疫邪見證千變萬化然總不出表裡二者但表證中有里邪里證中有表邪則又不可不細察也故列證分表裡以盡其常又細辨以盡其變使人人臨證胸有定見少救橫夭於萬一耳表證發熱時疫發熱與風寒雜證同其發熱時氣色神脈舌苔則不同辨得為時疫發熱又當知有淺深表里之異不辨無以施治發熱表證居多亦有里證發熱半表半裡發熱餘邪不盡復出於表發熱邪退正虛發熱而表證發熱脈不浮不沉而數寸大於關尺熱在皮膚捫之烙手久按反輕必兼頭痛項強腰痛脛酸或頭面身體皮膚有紅腫疼痛諸證不必全現有一於此便是表證發熱九味羌活湯人參敗毒散六神通解散選用冬月嚴寒及惡寒甚者大青龍湯葳蕤湯越婢湯陽旦湯可借用全不惡寒者白虎湯黃芩湯可加減用里證發熱脈或滑或沉數或洪滑關尺盛於寸熱必在肌肉筋骨初捫熱輕久按熱甚必兼煩渴胸腹滿大便或不通或自利或便血及膿小便黃赤或譫妄狂昏諸證雖不必全現必兼二三證方是里證發熱梔子豉湯黃連解毒湯小陷胸湯三承氣湯導赤散瀉心湯豬苓湯天水散選用半表半裡發熱脈多弦胸脅滿或熱或止或口苦咽乾目眩耳聾或目赤或喜嘔心煩或兼見表裡證達原飲柴葛解肌湯小柴胡湯選用時疫發熱時用藥最要清楚此處頭緒不差後傳變多危救援亦易不然難於收拾矣凡見發熱即當辨其氣色神脈舌苔為風寒為時疫系時疫又當辨在表在裡在半表半裡然時疫見證純表純里者少表裡夾雜者多表裡夾雜吳氏達原飲為主表證多加羌活里證多加大黃半表半裡證多加柴胡葛根淡豉或表裡證均見則諸藥全用即三消飲取效最多誠時疫主劑至已愈數日而復發熱者乃募原伏有不盡之邪復出於表當察其證之表裡多寡以前法治之大抵愈後復發則裡熱多而表熱少雖有當用表藥之證不過葛根柴胡淡豉而已無更用羌活之理若愈後另受風寒發熱無汗舌上無苔者不在此例時疫愈後復熱無汗重用葛根五錢最妙以其性涼而解肌發汗既不礙無汗之表又不礙煩熱之裡更有平素虛損或老人或大病後復染時疫屢經汗下清解其熱轉甚或全無表裡實證或六脈豁豁然空或較初起洪滑更甚或用表藥而身痛更甚或屢用清熱藥而煩躁昏沉更甚或屢用下藥而舌燥更甚此皆邪退正虛之發熱也王太僕所謂大虛有盛候反瀉含冤也此時須略去證狀而消息陰陽虛實陰虛則熱渴枯竭之證多責在腎宜六味地黃湯兼氣虛合生脈散須大作湯液晝夜頻進效始捷陽虛則嘔利悸眩之證多責在脾宜六君子湯兼血虛歸脾湯參胡三白散清燥湯選用若遇此等證仍用汗下涼解宣伐斷無生理矣又發熱之為表為里為半表半裡為復為虛證狀明顯有據者自易施治若脈證夾雜模糊難於分辨者須以舌苔為據初起舌苔薄白或無苔而潤屬在表白苔而厚或兼微黃或中黃邊白中黃尖白或二三色屬在半表半裡黃苔醬色苔黑苔屬裡舌苔燥則不論何色皆屬裡證屢經汗下後舌苔潤而發熱者屬陽虛無苔而燥者屬陰虛發熱之表里虛實依此辨之思過半矣惟虛證發熱有似實證即舌苔亦難憑據又當從病之來路探討若屢經汗下宣伐而熱愈甚者從虛治無疑或雖經汗下而熱漸減藥有效則仍屬餘邪未盡不可遽補致邪熱復壅夭人年壽似此虛實關頭不可不細心體認也以上辨表裡虛實諸法雖指發熱時言然類而推之凡證皆可依此為辨惟在學者之善悟耳惡寒時疫惡寒與風寒暑濕諸證不同諸證惡寒無時而勢不甚時疫惡寒有時而勢甚惡寒之後必見發熱熱時自熱而不覺寒寒時自寒而不覺熱非若諸證惡寒發熱之相兼也時疫惡寒傳裡之後少在表之時多而辨氣色神脈舌苔與發熱同但有淺深虛實之異邪淺而在表者惡寒之時少於發熱治法方藥同於發熱而以解表為主邪在半表半裡者寒熱往來如瘧狀治法方藥亦同發熱邪深入里失於攻下而熱深厥深反欲擁被向火惡寒而不發熱或熱亦微甚則四肢反厥此雖惡寒實非寒也乃陽氣為邪所鬱而不通以通郁為主達原飲大柴胡湯三承氣湯選用使裡氣通而鬱陽發反大熱而煩渴也此證在惡寒時最難辨其為熱須於九竅察之如目大小眥赤鼻孔干唇紅舌苔黃黑燥耳鳴或聾小便黃赤澀痛大便燥結或稀黃極臭或鮮血或心下至少腹有痛不可按處此皆熱深陽郁之象大抵周身皆見冷證一二處獨見熱證反當以熱證為主反此亦然乃辨寒熱真假之機要也余所見時疫不下數千里證惡寒者百中一二即四肢厥逆爪甲青紫詢其所苦亦不惡寒此可得其概矣至若本系時疫熱證因其人平素虛損衰老及大病之後用攻伐寒涼太過至汗出不止嘔利俱作四肢微厥六脈細濡而惡寒為陽虛乃攻伐太過所致當以參耆苓術為主寸口脈微者佐以升柴尺脈微者佐以桂附須知雖屬陽虛卻從熱證來而陰必虧桂附亦不可過用當佐以護陰藥為妙如白芍麥冬五味之類此證溫補略緩及溫補不到必死或過用溫補陽雖回而陰竭亦死此處不可不斟酌至當又有宣伐太過而成虛證之惡寒寒涼太早而成實證之惡寒以疫邪方伏於募原未經傳變之時胸膈必多痰滯有見其煩躁而遽用知膏芩連者有因其作渴而遽用生地麥冬者有病者自認火證而恣啖冷水西瓜梨薺太早者皆能抑鬱陽氣壅閉邪熱熱遏於中下二焦冷物停痰滯於上焦每每見惡寒證遇此惟以宣導痰滯為主痰滯通則惡寒自止不可過溫致下焦瘀熱蓄血斑黃呃逆而死不可清涼致胸腹痞悶而危宜用草果厚朴檳榔木香半夏蒼朮萊菔苓澤導痰開滯逐水痰滯水去則惡寒止而熱證見隨其傳變以施涼解攻利之劑乃有效也此法特救藥誤非治正病耳總之風寒以惡寒為重時疫以惡寒為輕多有初起惡寒一二日不治邪氣傳變而惡寒自已者與其誤治毋寧俟之若誤認惡寒為真寒用辛溫之藥發散未有不增其病勢者也寒熱往來寒熱往來與發熱惡寒異發熱惡寒一時兼至寒熱往來寒已方熱熱已方寒亦與瘧不同瘧發有時寒熱長短有定此則寒熱無時長短無定雖不同於瘧而邪俱在少陽半表半裡之間在傳變之初是由輕入重始則寒熱往來繼則熱多寒少再則但熱不寒至晝夜壯熱譫妄煩渴畢現在傳變之後是由重出輕晝夜壯熱漸減而為發熱有時而止又減而為寒熱往來又減而為戰汗至脈靜身涼而愈夫疫邪自里出表者輕自表入里者重初起寒熱往來是自表入里犯及少陽裡氣與邪相爭拒繼則邪深入里表裡並而為熱晝夜壯熱而勢日重既傳變之後而寒熱往來是邪氣向衰正氣來復自里出表經過少陽前之晝夜壯熱邪氣秉綱者至此正氣漸和而寒熱有時矣前之邪陽獨盛亢極無陰作純熱者至此則陰氣來復而寒熱相爭矣前之邪並表裡而熱渴日加者至此則裡氣逐出表邪而作戰汗矣治法於未傳變之先欲由表入里時但透達其邪使易傳化為主達原飲是也於傳變之後欲自里出表時以和解為主小柴胡湯是也於屢經汗下之餘脈或虛微濡弱結代心或悸動神或委倦形或羸弱過甚當養陰益氣助正卻邪為主參胡三白湯炙甘草湯清燥養榮湯補中益氣湯是也濡同軟頭痛時疫頭痛與風寒不同風寒是寒束於上部中下無邪上逆頭雖甚痛而不昏悶時疫是熱蒸於上部中焦邪犯上焦頭不甚痛而皆悶所謂卓然而痛者是也驗得氣色神脈舌苔為時疫頭痛而又有表裡之分初起頭痛腦後巔頂目珠略甚舌苔白而發熱者太陽頭痛也羌活川芎為主豆豉酒芩知母生地為輔額顱脹痛目痛鼻孔干舌苔白而微黃煩熱而渴者陽明頭痛也葛根為主豆豉石膏為輔兩額角痛眉稜骨痛寒熱往來口苦咽乾舌苔中黃邊白或中段黃尖上白少陽頭痛也柴胡荊芥川芎為主酒芩石膏為輔頭痛而三陽證悉具者吳氏三消飲為主時疫頭痛專見一經證者少雜見二三經證者多此方尤為多效頭痛甚者加豆豉芎防清其頭目頭痛舌苔黃心下滿蒸蒸發熱者陽明裡證也三黃石膏湯小承氣湯大柴胡湯防風通聖散選用舌苔黃或半截或旁邊有一塊白胸滿而嘔頭痛兼眩者痰厥頭痛也前胡為主半夏萊菔子枳桔山楂麥芽為輔兼煩熱者加大黃枳實汗下清解後頭痛心悸四物湯去川芎加丹皮知母黃柏或歸脾湯逍遙散並加生地棗仁凡頭痛見證混雜難分表裡者總以舌苔辨之頭眩時疫頭眩有三其一風熱頭眩乃時疫本病寸口脈多浮而發熱荊防芎薄天麻為主黃芩為輔煩渴加石膏其一痰水頭眩乃時疫兼證脈沉而弦滑兼嘔胸脅滿悸動前胡為主半夏茯苓枳桔膽星萊菔蘇子為輔然必視時疫大勢屬表屬裡於應用本方中加此數味可也其一虛證頭眩乃時疫變證多見於汗下清解後或素有怯證者如上虛寸口脈不及關尺多汗少氣不足以息心悸參耆為主中虛關脈不及寸尺多從嘔利太過而來不思食苓術為主下虛尺脈不及寸關腰膝萎厥二便清滑六味地黃為主三虛皆可加天麻或虛證已見仍夾有邪疫燥熱則不妨兼用清熱之品或補後脈氣稍實再為清解亦可大抵時疫頭眩多屬熱少屬虛治須斟酌若傷寒亡陽頭眩又當遵仲景法治之頭脹時疫頭脹者乃胃熱上蒸也下之則愈兼表者防風通聖散大柴胡湯吳氏三消飲無表證者三承氣選用病後虛脹與頭眩參看頭重時疫頭重者濕熱上壅也於清涼解表藥中加蒼朮或利水藥病後虛重亦與頭眩參看又有表裡無病病在頭中者其目必黃當遵仲景法用瓜蒂散搐鼻出黃水即愈目脹時疫目珠脹者陽明經病也兼表證葛根蔥白湯加石膏若胸滿舌有黃苔宿食也蓋食壅陽明其脈不下行而上逆故目珠脹宜平胃散加山楂麥芽枳殼消導之則愈至屢經清解而目珠脹痛不愈者當消息其肝臟以養陰滋血和肝之法治之如再不愈則當進而滋腎乃乙癸同源之治也項強酸時疫初起項強酸兼發熱乃邪越於太陽經也羌活為主狂躁正盛而項強者熱壅其經脈也石膏黃芩為主屢經汗下發熱已退而復項強者血燥而筋無養也四物六味為主外此若傷寒發痙之項強亡陽漏風之項強則又有仲景之法在背痛酸時疫初起背痛兼發熱者邪浮於太陽也羌活為主背痛而脹兼胸脅脹者邪客募原也草果厚朴檳榔萊菔子大腹皮為主屢經汗下後發熱已退背痛不止者經脈血亡也六味生脈四物為主又有平素勞倦內傷而背痛在膏肓二穴者當於東垣內傷諸論察之肓音荒腰痛酸時疫初起腰痛兼發熱者太陽受病也獨活為主兼脹者氣滯也加檳榔兼重者夾濕也加蒼朮牽引少腹及兩脅者氣滯血瘀也加青皮烏藥赤芍元胡兼理氣血疏通腎肝此皆初起實證治法又有即夾腎虛陰傷者腰痛獨甚於周身兼酸萎無力若尺脈無力後來傳變必危當於初起在表時加人參知母生地預顧其陰則危殆差減若徒用伐邪之品邪之深入者未必去而陰液大傷則昏沉舌黑直視失尿諸證見陰傷氣脫則厥逆證見蓋腰乃腎府為先天根本腰痛則腎虛不可不察要知此時疫初起腰痛尚有虛實之分若汗下後而見腰痛其為腎虛不待言矣宜六味四物不可疏通膝痛酸時疫初起膝痛發熱者邪在太陽經也獨活檳榔牛膝為主兼軟者濕甚也蒼朮為主然此特太陽之一證初起以解表邪大勢為先膝痛專藥一二味而已若經汗下表邪大勢已解則當察其邪氣之有無正氣之虛實專治下部不然恐致殘廢倘餘邪不盡留於下部則仍有熱證如骨蒸小便黃赤以黃柏苡仁清濕熱檳榔木通通壅滯筋攣則秦艽木瓜筋緩則蒼朮防己紅腫則赤芍丹皮續斷芎歸若無餘邪見心悸二便頻數尺脈虛小則當以補腎為急六味加牛膝枸杞知柏滋益陰精脛腿痛酸時疫初起脛痛酸者太陽經脈之郁也獨活為主兼攣者治在筋加秦艽木瓜兼腫者治在肉加木通赤芍檳榔兼軟者屬濕溫俗名軟腳溫往往一二日即死宜白虎加蒼朮湯或蒼朮黃柏此與膝痛頗同未經汗下則解表之大勢加一二味脛痛專藥表證已解惟留此證當專治之若屢經汗下而見虛證亦以補腎為主足痛時疫初起足痛有因素有腳氣痼疾者但治時疫於解表藥中微加檳榔木通若已經汗下表裡俱平而足痛不止則消息其腎家虛實同膝脛痛法治之肩臂痛酸時疫初起肩臂痛酸者手太陽經脈受邪也解表則痛自已經汗下後而肩臂痛者有經隧阻滯血脈空虛之別經隧阻滯者脈多有力證多熱渴以清熱活血為主黃芩赤芍歸尾紅花之類血脈空虛者證多萎困脈多芤澀養血益氣為主四物合參耆之類腕痛時疫初起腕痛者乃風淫末疾也初起解表汗下後益氣養血與肩臂痛同治周身骨節痠痛項背腰膝脛足肩臂諸痛已列於前則周身之痠痛備矣茲複列周身骨節痠痛者以痛在一處邪有專注痛在周身邪有分布也專注之邪須通其凝泣分布之邪須解其縛束故治周身痠痛疏表其大法也而酸與痛亦有別酸輕而淺痛重而深痠痛與拘攣又有別痠痛舉動如常拘攣屈伸不利痠痛病在營衛拘攣病在筋脈合痠痛拘攣又有上下淺深前後之不同在身半以上為末疾淺而易解在身半以下為本病深而難去合上下之痠痛拘攣在未經汗下與已經汗下者又有別未經汗下屬邪盛宜宣伐已經汗下屬正虛宜調補明乎此則痠痛在周身在一處按證施治無不當矣解表諸方人參敗毒散九味羌活湯六神通解散大羌活湯身重時疫初起發熱身重者濕勝於熱也蒼朮為主二三日至四五日傳變之後汗出更熱而身重者熱壅其經脈也白虎湯為主傳裡表無熱而舌燥便秘腹痛拒按而身重者內結而氣不達於表也三承氣為主屢經汗下表熱已退身重不可移動脈虛散而無根舌上無苔二便自通者陰陽兩亡經脈枯竭也審其陰陽偏勝而治之偏於亡陰多燥證六味合四物為主偏於亡陽多脾胃證六君合生脈為主陰陽俱竭生脈合六味為主自汗疫邪自內蒸出於表初起作寒熱時多自汗甚至淋漓不止不可以表虛論兼頭痛身痛仍以解表為主羌獨柴葛之類兼煩渴直清陽明之熱為主白虎之類有熱有結破結為主陷胸三承氣之類若屢經汗下邪已全退脈虛而舌無苔二便清利如常內外無熱證方可從虛斂汗蓋以時疫得汗為邪有出路而宜斂汗者恆少也盜汗時疫初起盜汗者邪在半表半裡也胸脅痞悶達原飲無痞悶小柴胡湯汗下後大熱已退有盜汗者餘邪不盡也小承氣小陷胸吳氏承氣養榮湯諸方清其伏匿餘邪盜汗自止戰汗時疫不論初起傳變末後俱以戰汗為佳兆以戰則邪正相爭汗則正逐邪出然有透與不透之分凡透者汗必淋漓汗後身涼口不渴舌苔淨二便清胸腹脅無阻滯結痛始為全解之戰汗否則餘邪未淨而復熱則有再作戰汗而解者有戰汗須三四次而後解者有戰汗一次不能再戰待屢下而退者有不能再作戰汗即加沉困而死者總視其本氣之強弱何如耳凡戰汗之時不可服藥補則戰止而汗不透留邪為患汗下則太過而成虛脫應聽戰汗透徹再觀脈證施治當戰時或多與熱湯飲之助其作汗戰汗之時脈多停止勿訝待戰汗之後脈自見也大抵戰汗之脈以浮為佳邪出於表也虛散微濡應有變煎獨參湯以待之防其脫也貧者米飲聊代之然必察其戰後系邪淨而氣欲脫方可用凡戰汗後神靜者吉昏躁者危氣細者吉氣粗而短者危舌萎不能言者死目眶陷者死目轉運者死戴眼反折者死形體不仁水漿不下者死戰汗雖為佳兆亦有吉凶得戰汗固由治得其宜邪退正復而致然不可強也嘗見服大發汗藥毫不得汗而飲冷水得汗者又有用下藥得戰汗者涼血活血得戰汗者生津益氣得戰汗者種種不一當知戰汗乃陰陽交和表裡通達自然而然非可強致也狂汗時疫臨解有忽手舞足蹈跳床投榻而後作汗者最為駭人然須驗其是否作汗作汗之脈浮而緩浮為邪還於表緩則胃氣自和待汗透自愈脈若浮洪浮數浮滑浮散雖有汗亦為發狂非作汗也頭腫時疫頭腫乃風熱壅於上部太陽之經脈鬱滯巔頂俗名大頭傷寒當視表裡輕重加輕清疏風之品以散其腫荊防薄荷蟬蛻川芎蔓荊菊花之類如發熱舌苔白表重於里也合表藥用九味羌活湯人參敗毒散是也如煩渴舌苔黃者里重於表也合里藥用三消飲涼膈散大柴胡湯調胃承氣湯是也古有用三稜針刺出惡血法亦可用至發癰膿者不在此例面腫時疫面腫風熱溢於上部陽明之經脈被郁也赤腫者方是治以白芷防風葛根石膏散其風熱視表裡之輕重合頭腫條內諸方加減用之若黃腫乃水氣也當從水腫治之頸項腫時疫頸項腫乃陽明風熱俗名捻頭瘟又名蛤蟆瘟當按頭腫條內表裡諸方加葛根桔梗牛蒡防風玄參癰膿發頤不在此例耳旁腫時疫耳旁腫乃少陽風熱俗名黃耳傷寒小柴胡湯加荊防芎芍元參亦當與頭腫參看胸紅腫時疫胸前一片紅腫粟起似麻疹風熱也俗名赤膈傷寒亦於頭面諸條表裡方中加荊防連翹赤芍牛蒡土貝周身紅腫時疫周身紅腫風熱溢於皮膚也用羌獨升柴葛芷疏其皮膚之毛竅石膏黃芩梔子連翹清其肌肉之熱赤芍歸尾紅花生地活其毒熱之瘀兼里證與頭腫諸條參治以上頭腫諸條列之表證者以初起言也若見於病後曾經汗下者為餘邪不盡治法則小異大約見於初起表邪盛實用表散之藥為主清裡之藥為輔見於病後里邪留溢用清裡之藥為主表散之藥為輔以此為權衡思過半矣發黃時疫發黃有四一宿食二蓄水三蓄血四鬱熱當疫證初轉在表時胸膈痞悶目珠黃面鼻正中黃宿食壅於胃脘也於表藥中加山楂神麯麥芽萊菔子傳裡時小便不利腹滿而響面目身俱黃蓄水也四苓散加梔子茵陳胸腹有軟痛處小便自利大便黑而發黃者蓄血也桃仁承氣湯熱在下焦大小便俱不利而發黃者鬱熱也茵陳蒿湯凡發黃必以二便為辨二便調屬上焦小便不利屬水小便自利而大便黑潤屬血大小便俱不利屬熱鬱乃胃熱移於膀胱不必利其小便但當通其大便是以茵陳湯有專功也發黃當辨其色上焦宿食發黃只在面目不及周身蓄水發黃周於身兼微黑而黯淡瘀血發黃亦兼微黑而潤澤鬱熱發黃兼赤而鮮明此即以黃辨黃之法也發疹時疫發疹熱邪從皮毛出也與汗同機以疏散清熱為主然與他證發疹不同他證或無裡熱此則未有不裡熱者雖以疏散為要而見煩渴舌苔黃則硝黃仍須兼用他證發疹疹散而病即愈此則有屢發而病不衰者他病發疹不過一二日為期此則為期不定治法必視里邪解否為用藥之準則不可以疹之一證為據也發斑時疫發斑邪熱出於經脈也雖不及戰汗亦有外解之機治以涼血清熱為主白虎化斑湯吳氏舉斑湯犀角地黃湯選用此亦與他證發斑有異他證發斑斑消則愈此總不以斑之消否為輕重而惟以里證為主每每斑出而譫妄如故或斑出數日已消而昏沉如故必待裡熱全清二便清利而後愈故治斑藥味可為輔不可為主發斑發疹熱皆在經而不在胃凡遇煩躁而不渴目赤而舌白即是將發斑疹之候預以清涼解表透毒之藥治之使邪易出易淨以上時疫表證皆關乎里不似他證表裡兩不相關故前列各條皆冠以時疫二字以明非他病之見證不可以治他病之法治之亦不可以此法治他病總憑氣色神脈舌苔辨之百不失一是五者為辨時疫之大綱實亦辨時疫之細目也
