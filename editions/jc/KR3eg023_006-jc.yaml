body:
  text: 卷末諸方大青龍湯麻黃桂枝杏仁石膏甘草炙加薑棗煎六神通解散捶法有川芎羌活細辛麻黃一錢甘草一錢黃芩二錢蒼朮二錢石膏一錢半滑石一錢半豆豉十粒加蔥姜煎九味羌活湯羌活一錢半防風一錢半細辛五分蒼朮二錢半白芷一錢川芎一錢黃芩一錢生地一錢甘草一錢加生薑蔥白煎葳蕤湯一方有乾葛無菊花葳蕤二錢半麻黃五分白薇五分青木香五分羌活五分杏仁五分川芎五分甘草五分石膏一錢半菊花一錢半白水煎大羌活湯羌活防風細辛蒼朮白朮川芎黃芩生地甘草防己知母獨活黃連白水煎人參敗毒散人參茯苓甘草枳殼桔梗柴胡前胡羌活獨活川芎薄荷加生薑煎吳氏達原飲檳榔二錢厚朴一錢草果仁五分知母一錢黃芩一錢芍藥一錢甘草五分白水煎小柴胡湯柴胡黃芩人參半夏甘草加生薑大棗煎炙甘草湯人參甘草炙桂枝阿膠蛤粉炒麥冬生地大麻仁加生薑大棗水酒各半煎柴胡四物湯柴胡半夏人參黃芩甘草當歸川芎白芍生地加薑棗煎參胡三白湯人參一錢半白朮一錢半柴胡二錢白芍一錢半白茯苓一錢半白水煎若脈微弱口渴心煩加麥冬五味子若煩口苦心下痞加黃連枳實若不眠加竹茹清脾飲青皮柴胡厚朴黃芩半夏甘草茯苓白朮草果加生薑煎大承氣湯大黃四錢酒洗芒硝二錢厚朴二錢枳實一錢白水煎小承氣湯大黃四錢厚朴一錢枳實一錢白水煎調胃承氣湯大黃三錢酒浸芒硝二錢甘草一錢白水煎人參白虎湯石膏知母甘草人參加粳米煎黃龍湯大黃三錢芒硝二錢厚朴一錢半枳實一錢甘草一錢人參一錢半當歸二錢加生薑五片大棗一枚煎六味地黃湯熟地山藥山萸肉茯苓丹皮澤瀉新汲井水煎生脈散人參麥冬五味子白水煎四物湯川芎當歸白芍熟地新汲井水煎越婢湯麻黃石膏甘草加生薑大棗煎陽旦湯桂枝芍藥甘草黃芩加生薑大棗煎黃芩湯黃芩芍藥甘草加大棗煎梔子豉湯梔子香豉先煮梔子後入香豉白水煎黃連解毒湯黃連黃柏黃芩梔子等分白水煎小陷胸湯黃連半夏栝蔞實先煎栝蔞實後內二味白水煎導赤瀉心湯黃連酒洗黃芩酒洗山梔薑汁炒黑滑石飛知母鹽酒拌犀角鎊甘草生人參麥冬去心茯苓各一錢加燈心生薑大棗煎豬苓湯豬苓茯苓澤瀉阿膠滑石各一兩白水煎天水散加硃砂名益元散滑石六錢甘草一錢研細末井水或燈心湯調柴葛解肌湯捶法加石膏一錢柴胡葛根甘草黃芩芍藥羌活白芷桔梗加薑棗煎吳氏三消飲檳榔厚朴草果知母葛根芍藥甘草羌活黃芩柴胡大黃加薑棗煎六君子湯人參白朮茯苓炙草陳皮半夏加薑棗煎歸脾湯一方無白芍人參白朮黃耆茯神棗仁遠志木香當歸白芍炙甘草加桂元肉薑棗煎清燥湯蒼朮一錢炒白朮五分炒黃耆一錢半人參三分茯苓三分黃連一分炒黃柏二分酒炒甘草二分陳皮五分豬苓二分澤瀉五分升麻二分柴胡一分五味子九粒神麯二分炒麥冬二分當歸二分酒洗生地黃二分白水煎大柴胡湯柴胡一錢大黃二錢枳實一錢黃芩一錢半夏一錢白芍一錢加生薑三錢大棗一錢煎吳氏清燥養榮湯知母天花粉當歸身白芍甘草生地汁陳皮加燈心煎補中益氣湯人參白朮炒黃耆蜜炙炙草陳皮當歸升麻蜜炙柴胡炒加薑棗煎三黃石膏湯黃柏黃芩黃連梔子淡豆豉麻黃石膏加生薑大棗細茶煎熱服防風通聖散又名雙解散防風大黃當歸芍藥芒硝荊芥麻黃梔子連翹甘草桔梗石膏滑石薄荷黃芩白朮川芎加生薑蔥白煎逍遙散柴胡當歸白芍白朮茯苓甘草薄荷加煨姜煎瓜蒂散甜瓜蒂炒黃赤小豆共為末熟水或韭水調量虛實服或用搐鼻葛根蔥白湯葛根芍藥知母川芎加蔥白生薑煎平胃散蒼朮厚朴陳皮甘草加薑棗煎吳氏承氣養榮湯知母當歸芍藥生地黃大黃枳實厚朴加姜煎涼膈散芒硝大黃酒浸山梔連翹黃芩酒炒甘草薄荷加竹葉蜜煎四苓散吳氏有陳皮無白朮亦名四苓散茯苓豬苓澤瀉白朮白水煎桃仁承氣湯大黃芒硝甘草桃仁桂枝白水煎茵陳蒿湯茵陳大黃梔子白水煎吳氏舉斑湯白芍一錢當歸一錢升麻五分白芷七分柴胡七分穿山甲二錢炙黃加姜煎犀角地黃湯犀角生地丹皮芍藥白水煎三黃瀉心湯湯液論有黃芩保命集有甘草大黃川黃連以麻沸湯漬之須臾絞去滓溫服藿香正氣散大腹皮紫蘇藿香甘草桔梗陳皮茯苓蒼朮厚朴半夏曲白芷加薑棗桔皮半夏湯陳皮半夏加生薑煎竹葉石膏湯人參半夏麥冬甘草竹葉石膏加粳米生薑煎大半夏湯半夏人參白蜜以水和藥蜜揚之二百四十遍再煎理中湯人參白朮炒乾姜炙甘草白水煎十棗湯芫花熬甘遂大戟等分大棗十枚煮湯內藥末強人服一錢匕二陳湯陳皮半夏茯苓甘草白虎湯石膏知母甘草加粳米白虎加蒼朮湯即白虎湯加蒼朮白虎舉斑湯石膏知母甘草人參白水煎大陷胸湯大黃二兩芒硝一升甘遂一錢為末先煮大黃去滓內芒硝煮一二沸內甘遂末溫服大陷胸丸大黃八兩芒硝葶藶炒杏仁去皮尖各半升合研取彈大一丸別搗甘遂末一錢白蜜二合煮服抵當湯水蛭三十豬脂熬黑虻蟲三十去頭足翅桃仁三十去皮尖研大黃四兩酒浸白水煎八珍湯人參茯苓當歸熟地白朮甘草白芍川芎加薑棗煎葛根芩連湯葛根黃連黃芩甘草白水煎麻仁丸麻仁二升芍藥半升大黃一斤去皮枳實一斤厚朴一尺去皮杏仁一升去皮尖熬別作脂煉蜜丸天王補心丹一方有石菖蒲四錢無五味子一方有甘草生地四兩酒洗人參五錢元參五錢炒丹參五錢炒茯神五錢桔梗五錢遠志五錢去心炒棗仁一兩炒五味子一兩炒天冬一兩去心炒麥冬一兩去心炒當歸一兩酒洗柏子仁一兩炒去油蜜丸硃砂為衣燈心湯下荊防敗毒散荊芥防風柴胡羌活獨活前胡川芎枳殼人參甘草桔梗茯苓等分加薄荷葉煎倉廩湯人參茯苓甘草前胡柴胡羌活獨活桔梗枳殼川芎加陳倉米生薑煎四君子湯人參白朮茯苓炙甘草加薑棗煎異功散人參白朮茯苓炙甘草陳皮加薑棗煎附子湯附子白朮白茯苓白芍人參白水煎吳氏安神養血湯茯神棗仁當歸遠志桔梗芍藥地黃陳皮甘草加龍眼肉煎建中湯此小建中湯桂枝芍藥甘草生薑大棗飴糖煎普濟消毒飲黃芩黃連人參桔紅元參甘草桔梗柴胡薄荷連翹鼠黏子板藍根馬屁勃白殭蠶升麻白水煎吳氏蔞貝養榮湯知母花粉貝母栝蔞實桔紅白芍當歸紫蘇子白水煎吳氏柴胡養榮湯柴胡黃芩陳皮甘草花粉當歸白芍生地知母加生薑大棗煎吳氏柴胡清燥湯柴胡黃芩陳皮甘草花粉知母加生薑大棗煎吳氏人參養榮湯人參麥冬遼五味地黃歸身白芍知母陳皮甘草白水煎吳氏參附養榮湯當歸一錢白芍一錢生地三錢人參一錢附子七分炮炒乾姜一錢白水煎犀角大青湯犀角上大青中元參中甘草下升麻中黃連中黃芩中黃柏下山梔中水二鍾煎一鍾柴葛五苓散柴胡葛根茯苓澤瀉豬苓白朮桂枝
