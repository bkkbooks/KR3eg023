front:
  text: 序瘟疫一證歷代明哲具有成方如仲景有大青龍湯陽旦湯越婢湯黃芩湯白虎湯大小柴胡湯三承氣湯麻黃升麻湯諸條列瘟疫之見證為汗法下法和法雙解法輕重深淺纖毫備具特散見於諸經條中而未嘗直指其名為瘟疫非不欲明言也其書本傷寒立論而互為區別之書非專論瘟疫之書且上古文辭簡易詳於辨證而不詳於立名欲人從證上細辨則不必於名上區別而自無混治之失嗣是而後河間有宣明五氣論則論瘟疫較詳立法更備如桂苓甘露飲黃連解毒湯三已效方涼膈散人參石膏湯雙解散諸方皆是而亦未正其名易老東垣大羌活湯九味羌活湯立方更備而亦無專書無特名至吳又可先生貫串古今融以心得著時行瘟疫一論真可謂獨闢鴻蒙揭日月於中天矣顧其書具在而時賢有未見而不用其法或雖見其書而不能信者無怪矣有口誦其書嘖嘖稱道而對證施方仍多不用其法口則曰此時證也而手則仍用傷寒之方拘傷寒之法者比比皆然愚揣其情必非知而不用也知其名而未得其辨證之法耳愚目擊心傷不揣固陋而取吳子之原本或註釋或增訂或刪改意在辨瘟疫之體異於傷寒而尤慎辨於見證之始故首增辨氣辨色辨脈辨舌辨神諸論於開卷使閱者一見了然則吳子之書人人可用而瘟疫之橫夭者少生全者多誠斯世斯民之幸也上元戴天章麟郊甫識於存存書屋乾隆四十八年歲在癸卯夏五月望日孫男嗣琦謹書序先大父北山先生以通儒邃醫學所論著傷寒雜病諸書及咳論注瘧論注廣瘟疫論凡十數種皆先世父雪村先生行楷細字錄藏於家近書坊中有刻本瘟疫明辨四卷祖啟購閱之即先大父存存書屋廣瘟疫論也雖易其名幸未改竄其文不知何人誤刻為歙人鄭某之書在先大父固不爭此而子孫見之不容不正也因出存存書屋原本校而刻之以糾偽傳廣先德因嘆傷寒一書注者百家至程郊倩實為獨闢鴻濛後有慈溪柯韻伯論翼出而傷寒之書嘆觀止矣瘟疫一證古無成書至吳又可實為獨闢鴻濛更有先大父此書出而瘟疫之書嘆觀止矣事固有更閱數千年而後得所折衷者此類是也代生名賢民何幸歟乾隆四十七年歲在壬寅秋七月望後二日孫男祖啟謹識序六淫之邪中人為病病寒尤甚蓋風者善行數變其勢猛急寒者收引拘束其氣堅凝故其病人也不假少貸而為患至速各家醫書均首列中風傷寒二門以示後學習是業者咸致力於風寒以求諸病擴而充之觸類引伸固無所不概若執而守之亦不免刻舟求劍而所遺實夥雖長沙有論後學註釋繁多究使指歸不定以致濕溫時疫漏而不講迨吳又可瘟疫論出稍使人知疫與傷寒同途異歸不可拘傷寒法而治疫然其辨悉猶不若廣瘟疫論之提綱挈領曉暢明白能使不習醫者洞然領略也予於庚寅偶得此書故友王村舟言是書乃金陵前輩麟郊戴公存存書屋之稿本近為儀徵鄭氏所刻發坊未久板已散失坊間竟無覓處予每惜之庚子遷居北城得識國子學正戴敬咸先生乃知麟郊公為先生之祖因叩及是書藏本與予所得者相校讎一字無訛雖鄭氏前刻未將存存書屋之來由道出情似掠美然非其剖劂流傳則予亦不得睹見而無由與敬翁先生探其本源也因慫恿梓行以繼前徽壬寅冬正在付梓尚未蕆工而敬翁先生忽嬰疾而逝今其嗣君踵成是書囑予紀其本末予亦不敢以固陋辭謹敘其事以紀麟郊公之作美於前而得其賢嗣繼美於後庶此不刊之書得以永垂霄埌救濟生靈實可上媲長沙之功而庇醫林後學於不淺矣乾隆四十八年歲次昭陽單閼氏皋月會稽沈懋發撰
