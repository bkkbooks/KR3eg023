body:
  text: 卷之三里證煩躁煩乃心煩情思不定神不安而形如故躁則形擾揚手擲足形不寧而神復亂煩輕而躁重也在他證有謂煩屬心躁屬腎者煩屬陽躁屬陰者在時疫總屬鬱熱熱淺在上則見煩躁之形熱深在下則漸近昏沉而不煩躁是時疫初起可即煩躁之輕重辨病勢傳變之輕重不煩躁則非時疫設氣色神脈舌苔有時疫確據亦屬但表不里之輕證凡初起憎寒發熱而煩躁者邪在半表半裡三消飲九味羌活湯六神通解散選用隆冬寒甚汗難出者大青龍湯葳蕤湯可借用舌苔已黃渴而喜飲身熱汗出而煩躁者邪入於胃也白虎黃芩三承氣小陷胸三黃瀉心涼膈散選用舌苔已黑煩躁漸近昏沉者邪入心包也犀角地黃湯加羚羊角黃連解毒湯選用屢經汗下清涼表裡俱無阻滯而煩躁者陰液傷也生脈散六味地黃湯吳氏諸養榮湯選用或用汗解清利滋潤諸法不應而煩躁加甚者當細驗舌苔若黃黑苔中夾一塊白潤是為夾水或平素胸有痰飲或未病之先曾飲冷物或初煩躁時過飲冷水恣啖涼物或用清涼太早皆能停飲於胸膈胃脘之間寒飲拂鬱其疫熱外不能達表內不能傳胃故煩躁轉甚驗舌之後更細按胸脅滿痛而軟漉漉有聲再細察其脈右寸關或弦緊或緩皆停水確據當以蒼朮半夏萊蔔厚朴先消其水氣然後治其煩躁無不應者不論舌苔有無黃黑但煩躁而兼小便不利者雖無水氣在胸脅而少腹略有滿痛處即當以導赤散瀉心湯四苓湯豬苓湯益元散利其小便所謂心邪不從心瀉而從小腸瀉也嘔吳又可曰時疫有始終能食者邪不傳胃也慎勿絶其飲食此不嘔者也愚嘗見時疫初起未發熱時表證未見有先作嘔數日者此疫邪先犯太陰當辨其口氣無臭氣而不黏者屬太陰寒證有臭氣黏厚者屬太陰疫證此為先里而後表不可遽用清涼閉遏邪氣致使不能透達傳化雖四肢有時厥逆脈有時沉伏亦不可用溫熱致增嘔證甚有舌紫昏沉者惟當宣其胃氣藿香正氣散最宜若已發熱而嘔者吳氏達原飲加半夏兼三陽表證加羌活葛根柴胡若嘔而煩渴身熱而不惡寒者邪在陽明也白虎湯黃芩湯並加半夏若嘔而舌黃胸中有滿痛處桔皮半夏湯加枳實山楂麥芽川貝貝母力緩用至五錢或一兩乃能舒郁散結若嘔而舌黃心下臍上有滿痛拒按者大柴胡湯若嘔而舌黃或黑少腹有滿痛拒按當視其前後何部不利大便不利調胃承氣湯小便不利四苓加木通或益元散利之則愈寒熱已解二便通利胸腹無滯而嘔不止者餘熱在胃也竹葉石膏湯屢經清下嘔不止而舌無苔多汗心悸萎倦者中氣傷也大半夏湯或六君子湯加白蔻屢經清下倦怠異常四肢漸冷者乃清下太過而中寒也理中湯甚至加附子然此為治藥之法非治疫之法也宜詳察之咳咳者疫邪夾他邪干肺也有初起在表夾風邪干肺者脈兼浮咳多痰沫必兼鼻鳴自汗灑淅惡寒於透表諸方中加前胡桔梗蘇子杏仁淡豉有夾水乾肺者不論表裡脈必兼緩咳必多清痰兼舌白心悸胸滿或嘔或吞酸於表裡藥中加桑皮半夏茯苓川貝母萊蔔子有疫熱傳裡燥火熏肺者脈必數咳必無痰有痰亦難出而咽痛於裡藥中加花粉黃芩川貝蔞仁有病後陰傷肺燥者脈必澀咳必無力舌必赤而無苔吳氏清燥養榮湯加麥冬元參知母貝母有屢經汗下或平素陰虛腎氣上逆者咳必兼上氣顴必時赤足膝必清萎脈必散六味加枸杞五味牛膝疫邪兼咳者少即有之亦非大有關係之證宜以病之表裡大勢為主加治咳藥於本方療之渴渴乃熱象時疫為熱證而有不渴者蓋初起濕熱相兼為蒸氣熱未勝濕則鬱悶心煩而不渴熱已大盛在經而不在胃則煩躁身熱而不渴在下而不在上則燥結而不渴在血分不在氣分則昏沉而不渴疫邪初從太陰發者胸腹滿嘔而不渴此外無有不渴者矣初起在表發熱頭痛舌白而渴脈必不浮不沉而數六神通解散加石膏葛根或九味羌活湯加石膏葛根半表半裡口苦咽乾目脹而渴脈必數小柴胡湯加花粉知母或亦加石膏或達原飲加石膏葛根邪已入胃作渴身熱自汗舌現黃苔或醬色或黑燥當察其胸脅少腹按之無痛處而渴者為有熱無結脈必洪宜白虎湯按之有痛處為有熱有結痛在心下脈必滑大關上尤甚小陷胸湯在臍上及當臍關中脈必滑大小承氣湯在臍下尺中脈必滑大調胃承氣湯心下至少腹俱痛寸關尺必皆滑大大承氣湯痛在左脅不可按左關脈必弦或澀或芤桃仁承氣湯痛在右脅不可按右關脈必弦或滑或遲十棗湯渴而小便不利少腹不可按尺脈必數四苓散豬苓湯六一散汗下後身熱已除而渴不止餘邪未盡也宜將前所用藥再作小劑以利之屢經汗下渴而舌上無苔胸腹無滿痛心悸而煩脈虛細或浮散或澀亡陰也六味合生脈為主渴與煩躁同機而渴輕於躁渴有喜飲而又有喜熱飲冷飲之分在他證不喜飲及喜熱飲則為真寒假熱在時疫喜熱飲多發斑疹不喜飲熱在血分真寒假熱百不一見也時疫初起以渴為機括渴甚則熱甚渴微則熱微在末路尤以渴為有餘邪不渴為無餘邪也口苦熱邪在中上二焦則口苦非特時疫為然即感風寒口苦亦屬少陽熱證如時疫當惡寒發熱表證正盛時見口苦即於發表諸藥中倍加清熱之品輕則黃芩重則知母再重則石膏不但三陽表證如此即三陰里證手足冷惡寒嘔利胸腹滿不渴證狀似乎純冷無熱而一兼口苦即當於溫燥藥中加利熱之品如用半夏蒼朮草果厚朴必加木通苓澤甚至加知母黃芩本吳氏達原之義口苦為熱證的據每遇證狀模糊寒熱莫辨必藉此以決之至舌苔黃黑乾燥煩躁熱渴閉結又清下之不可或緩者矣口甘口苦口甘同為熱證苦為燥熱在上中二焦多渴屬三陽甘為濕熱在中下二焦多不渴屬三陰蓋脾胃屬土稼穡作甘土邪下涉腎位水土相蒸甘味上溢於口多兼嘔吐人每誤認胃寒而用溫中之劑不知濕熱在於下焦土能剋水溫燥太過腎水告竭總不見熱渴諸證惟目不見物漸至昏沉而死口甘一證在諸證初起猶可用溫燥開導之品而亦不宜過劑在時疫必以清熱為主消痰為輔或胸中停飲太甚亦不過加蒼朮半夏而已如二陳去甘草加薑汁炒山梔薑汁炒黃連竹茹黃芩等類為口甘要藥烏梅更妙酸能勝甘蓋五行剋制自然之理也或四苓散加山梔亦得然必以時疫之大勢為用藥之權衡斯可矣唇燥唇燥者陽明熱也時疫見此當辨其色深赤為大熱宜清下淡白為亡津液宜滋潤色如常為津液不流通熱在經脈宜葛根齒燥時疫齒燥有三輕淺者為陽明經熱前板齒燥身熱目疼鼻乾不得臥此將發斑疹及衄血之先兆葛根為主黃芩知母石膏為輔重者為胃府燥熱通口皆燥甚則黑如煤炭三承氣三黃石膏選用至重者為陰火煎熬亡血太甚腎水涸竭當峻補其陰知母黃柏生地元參天冬麥冬丹皮每味兩許大作湯液加童便金汁晝夜兼進若藥輕治緩則不及矣鼻孔干時疫鼻孔干有四風熱則鼻鳴荊防葛根薄荷為主陽明經熱則煩躁葛根石膏為主胃熱腑證則大渴舌黃三黃石膏為主亡津液肺燥麥冬生地五味為主大抵風熱經熱者十之五六腑熱亡液者十之二三非謂熱深而鼻孔反不幹也以煩渴大熱證見則不覺鼻孔之干與否耳耳聾耳聾者少陽邪熱挾痰上壅也時疫耳聾者多蓋邪之傳變出表入里必干少陽又時疫屬熱熱至上升挾痰涎濁氣上壅隧道故耳聾也治法以疫邪大勢為主見於初起傳表時於表藥中加荊防川芎見於入里時於裡藥中加黃芩知母屢經汗下耳聾不愈不可急治養陰調胃為主須待粥食如常二便調勻始由漸而愈也鼻如煙煤時疫鼻如煙煤者邪熱爍肺也由鼻孔干而來急當清下少緩則肺胃枯絶矣三承氣合白虎或三黃石膏加青黛或小陷胸加犀角或犀角大青湯視其兼證擇而用之鼻孔扇張鼻孔扇張有三一痰壅於肺氣出入有聲喘咳胸滿不渴宜栝蔞貝母桑皮蘇子瀉肺肺氣通自愈一鬱熱於肺氣出入多熱有微表束其鬱熱古人獨主越婢湯蓋散其外束清其內郁也用於時疫中以葛根易麻黃或葛根黃芩黃連湯亦可一腎氣虛而上逆氣出入皆微多死此證必得之屢經汗下或兼多汗心悸耳聾急宜大劑六味合生脈散加牛膝枸杞或可百救一二咽乾咽乾者邪熱淫於膈上也在傷寒為少陽熱證時疫亦然宜黃芩甚則佐以花粉知母咽痛時疫咽痛為熱淫於肺當視其咽中有結無結無結者微紅以桔梗花粉黃芩元參治之有結者紅腫當加牛蒡赤芍消其腫結甚則起紫泡白泡是為乳蛾必以針刺去惡血再服清熱之藥方妙時疫中常有急喉風急喉痹二險證旦發夕死不可不察也急喉風咽痛而喘乃痰邪夾熱上壅於肺古方用膽礬吐其痰涎惡血或皂角膏吐之治之稍緩則氣閉而死急喉痹即乳蛾速長閉塞喉嚨亦以刺去惡血為主甚或用刀大開其膿血此雖見於時疫中必其人平素貪厚味多怒郁肝火妄動有以致之也舌燥舌乃心苗腎竅通其本脾脈絡其下時疫舌燥由火炎土燥中宮堵截腎水不能上交心火須察其苔之有無與色之深淺施治白苔而燥疫邪在表痰已結於膈上吳氏達原飲加石膏川貝蔞仁大黃此吳氏名白砂苔熱極不變黃色下之即黃不可緩也黃苔而燥疫邪傳胃小承氣小陷胸大柴胡選用醬色苔而燥疫邪入胃深及中下二焦調胃承氣湯黑苔而燥疫邪入胃至深傷及下焦大承氣湯燥成塊裂或生芒刺熱更甚也大承氣倍其分兩大黃鬚兩許方妙各燥苔下之漸減不即盡淨為藥已中病力未到耳當再下之有下至三五次十餘次而後愈者若屢下而燥苔愈長不可更下當察其腹中若揉按作響者痰水結於中焦脾胃受困津液不能上潮改用平胃二陳溫燥之劑即愈又腎陰竭涸愈下愈亡其陰燥苔不回目無神耳聾心悸腰萎再下必死宜六味地黃湯合生脈散至無苔而燥須辨其色正赤或深紫熱歸心包血分熱極石膏知母黃連犀角羚羊角牛黃為主鮮紅亡陰二冬生地元參知母阿膠人參為主大抵舌無苔則胃無物可清潤不可攻下舌強附舌萎時疫舌本強硬為熱而兼痰宜清下無疑須加清痰之藥兼白苔者膈間未經煎熬其痰尚濕佐以半夏大柴胡湯是也兼黃苔者已經煎熬其痰漸燥佐以川貝栝蔞小陷胸湯是也兼黑苔者熱極痰亦為火佐以牛黃方效若無痰舌色正赤深紫裂燥而強者熱毒蘊於心包也三黃石膏湯加犀角牛黃急清其熱舌強雖與舌燥相類而燥屬胃主熱強屬心主痰又舌萎軟而枯小與舌強硬而不縮有異乃虛脫已極大補及滋潤或百救一二若屢經汗下清熱消痰而舌強者又當與舌萎同治舌卷短時疫之舌一見黃苔便當下失下則由黃而變醬色變燥變黑變生芒刺再失下則變卷變短為下證至急之際宜大下屢下方和緩則不救胸滿痛時疫胸滿而不痛者為邪未結為無形之氣稀薄之痰痛而不滿者為病在經絡有虛有實有虛實相兼滿而痛者為邪已結須分痰食血以施治屬無形之氣者按之不痛時疫初起邪在募原多有此證宜達原飲加枳桔木香大腹皮以開豁之屬稀薄之痰者時疫二三日邪在半表半裡多有此證宜達原飲加半夏萊蔔子或小柴胡湯加萊蔔子病在經絡痛而不滿者初起屬實於解表藥中加延胡烏藥舒其經絡之氣血病久屢經汗下多虛於養氣血藥中倍當歸更有虛中夾實者於解表清裡藥中加乳香沒藥最妙滿而痛不可按邪已結矣痰結者牽引竄痛兼嘔小陷胸湯大柴胡湯或二方合用甚則大陷胸湯大陷胸丸食結者硬痛成塊不可按多在心下宜平胃散加枳實蘇子萊蔔子白芥子亦有在膈上者為危證當吐之宜瓜蒂散此二者不可便下須待其轉動方可下之蓋結在上焦屬氣分下之太急則氣逆嘔吐外用按揉之法為妙血結者不可按按之軟脈芤澀弦宜於解表清裡藥中加桃仁紅花三七歸尾甚則桃仁承氣湯時疫多實多熱至胸膈滿痛又屬實邪非虛證惟是屢經攻下胸痛更甚者乃脾腎兩虛下氣上逆宜溫理脾胃以建中鎮安之甚則導火歸元納氣歸腎皆可然不多見須消息斟酌不可輕試脅滿痛脅滿痛與胸滿痛同而微有不同者胸滿痛有宿食為病脅滿痛無宿食為病乃亦有因宿食在胸腹而滿痛及脅者時疫脅滿痛是痰氣血三者為病其中亦有滿而不痛痛而不滿滿痛並作之分其滿而不痛者募原之邪未經傳變宜達原飲兼寒熱往來者大柴胡湯痛而不滿者邪分布於少陽之經宜小柴胡湯滿痛並作者當分左右左屬血小柴胡去人參加延胡歸尾紅花桃仁甚者加莪朮三稜三七五靈脂右屬痰與氣痰大柴胡倍半夏加牡蠣萊蔔子甚則白芥子甘遂大戟芫花氣加青皮萊蔔子木香大腹皮痰與氣痛皆無常所而有聚散痰散仍有所苦氣散則無所苦若屢經汗下清利而脅痛更甚者虛證也氣虛必嘔利養氣為主血虛必煩熱養血為主此亦十中一二脅痛與胸腹痛不同胸腹譬之沖衢塞不能久脅則譬之僻巷塞則難開用藥須明此意時疫脅痛雖有痰氣血之殊而總不離乎熱黃芩是為主藥若別有熱證者黃連山梔又所必需他病脅痛有寒有熱不在此例腹滿痛時疫腹滿痛屬宿食為邪熱所結者十之七八屬氣血痰水者十之二三蓋腹為胃與小腸之正界非胸脅少腹之地可比腹滿而不痛者屬邪在氣分屬水穀散漫而未燥結氣分脈多沉或弦水穀脈滑氣分通腹皆滿水穀滿有分界氣分者厚朴大腹皮青皮陳皮枳桔為主水穀者半夏山楂麥芽神麯萊蔔子枳實為主時疫為熱證腹滿亦當清熱兼以順氣消食可也若舌多黃苔雖滿而不痛為邪已傳胃宜小承氣湯下之痛而不滿者屬邪在血分屬水穀燥結諸病他病或有屬冷者時疫總屬熱證痛不可按而無硬處者於清裡方中加赤芍不可按而有硬處者調胃承氣湯滿痛兼作為痞滿在氣燥實在血大實大熱之證大承氣湯諸病腹滿痛或兼自利當責之虛冷時疫自利屬熱結旁流下之則止不可疑為虛冷若滿痛而喜燥喜溫或惡寒手足冷清利之益甚或右關遲緊此非本病乃因煩渴飲冷太過或用清涼太過太早之所致又當以溫燥為主不可執一然此亦治藥弊非治本病也少腹滿痛時疫少腹滿痛為邪熱結於下焦下焦乃大腸膀胱及厥陰分界與中焦異亦有滿而不痛痛而不滿滿痛兼作之不同初起滿而不痛者濕勝氣滯也檳榔厚朴蒼朮為要藥痛而不滿者手不可近熱傷厥陰血分也黃芩以清熱赤芍歸尾以活血柴胡以升厥陰之氣若牽引陰器及兩胯夾縫者加秦艽即愈滿痛兼作者不論初起末後當視其前後在前小水不利蓄水也四苓豬苓益元等方選用在後大便不利有燥屎也三承氣選用小便利而大便色黑者蓄血也抵當湯桃仁承氣湯選用以大小便之通塞為辨固矣亦當細察其滿痛而有硬塊不可按者屬燥屎滿痛如鼓不可按而卻無塊者屬溺蓄脬中滿痛拒按而軟者屬蓄血以此辨之瞭然矣外有時疫末路滿而不痛痛而不滿喜溫喜按者為虛證當細詢來路若屢經清下太過當消息溫補以培養陰陽不可執時疫為實邪熱證而不變通也然此亦十中一見耳上滿痛諸證乃時疫里證之大端總屬熱邪內陷在風寒暑濕諸門則寒熱虛實俱有在時疫已經傳變見於煩渴燥熱既顯之後其為熱證易辨若見於未經傳變之先乃疫毒鬱而未發多不渴多不發熱甚有手足反厥冷者依風寒治則當溫依時疫治則當清毫釐千里反掌生死當於氣色神脈舌苔五者細察而詳辨之自利時疫自利皆熱證也其所利之物與內虛內冷者自別冷利之色淡白熱利之色正黃甚有深黃醬色者冷利稀薄熱利稠黏虛冷利散而不臭熱利臭而多沫虛冷易出熱證努圊冷利緩熱利暴注下迫而裡急此辨時疫熱利與諸冷利之大概也時疫初起有手足厥冷惡寒嘔吐腹痛自利者全似太陰寒證辨其為疫只在口中穢氣作黏舌上白苔粗厚小便黃神情煩躁即可知其非寒中太陰是時疫發於太陰也煩躁輕則藿香正氣散煩躁甚則用達原飲一二服後即見三陽熱證矣此時若用溫中藥轉見四肢逆冷手足青紫而死不可不細察也時疫初起頭疼發熱而自利九味羌活湯傳變太陽少陽合病身熱口苦咽乾目眩而自利者黃芩湯兼嘔加半夏傳裡舌黃譫妄而自利者按其心下至少腹有硬痛處與大承氣湯無硬痛處小承氣小陷胸大柴胡選用此在下其熱不必以結為主故雖無硬痛亦主大黃時疫自利而小便不利腹滿而無硬塊時作腸鳴者熱在小腸膀胱而蓄水也四苓散豬苓湯益元散選用時疫自利受補者少至屢經清下無表裡證自利漸至清穀而脈微細者則六君子湯補中益氣湯理中湯又所當酌用也便血時疫便血熱邪深入也先當辨其血色鮮紅者清熱為主黃芩湯三黃石膏湯犀角地黃湯血色紫黯成塊下者逐瘀為主桃仁承氣湯抵當湯須按腹脅有痛處用之為確時疫便血散晦夾涎水者脾胃虛而臟腑傷也歸脾補中八珍可借用並加烏梅時疫便血之後多亡陰證神昏耳聾舌無苔而燥身痛不可轉側之類皆是生脈六味加阿膠峻補其陰然多不救也便膿血時疫便膿血與便血有燥濕之分便血屬燥熱涼潤為主便膿血屬濕熱清熱兼分利為主時疫初起頭痛發熱便膿血者即古所謂疫痢是也不必治膿血但解其表表解則便數自減決不可早施清裡攻下之藥即分利清涼亦所當慎蓋邪方在表清裡邪則內陷深入後極難治且時疫一見便膿血則煩渴之熱勢反緩蓋熱隨利減也所以苦寒之品不可浪用惟以倉廩湯為主詳見夾痢條下時疫傳變至半表半裡便膿血者柴葛解肌湯加苓澤木通黃芩時疫傳變入里煩渴譫妄悉具而便膿血者黃芩湯葛根芩連湯選用兼裡急後重腹中拒按者加檳榔大黃時疫屢經攻下而便膿血滑利者當以養中調氣養血為主清熱為佐老人虛人亦仿此例大便閉時疫屬濕熱大便閉者少間有閉者乃平素胃陽強盛多燥氣也夫本來陽盛復受時疫則濕熱皆變為燥熱雖兼表證未得汗可下以時疫與傷寒不同傷寒邪從表入有表證未得汗必不可攻裡時疫邪從內發雖有表證每每發表而不得汗必待裡氣通而後表始得汗所以時疫大便一閉即有表證亦當下之不可逡巡也若初起未經表散則當用三消飲下之為當有表證尚可下則煩渴譫妄舌苔黃黑燥烈卷短胸腹硬痛諸證備見更當分別輕重下之無疑又有大便閉而屢下不通者則必有夾邪當審之有夾水者水在腸中則不下而自利水在胃脘以上則脈多弦多緩往往上嘔而不下利且舌白而心下按之作響雖用承氣不能下行故下之不通當先用半夏茯苓蒼朮消其水而後下之亦有可用大陷胸湯者必胸上痛而手不可近方為藥與邪敵有夾氣者氣滯於胸膈之間主上逆而不下降胸腹串痛而脈沉當先以蘇子萊蔔子木香檳榔順其氣而後下之有氣虛而屢下不通者屬老人虛人其脈必兼無力其色必悴其肌肉必緩其神必散若下證全具當與大承氣加人參一服而宿垢頓下或陶氏黃龍湯或麻仁丸參湯下酌其里證之多寡用之有血虛而屢下不通者屬婦人産後癰疽潰後或平素陰虛及亡血其脈必兼澀四物六味生脈及吳氏諸養榮方麻仁丸選用仍須蜜煎豬膽汁導之大凡時疫大便一閉即當下之然須詢其有無所苦若無所苦下尚可緩有所苦而下之不通又須察有無夾邪及虛也當下者十之五可緩者十之三夾邪者十之一耳時疫如此他病則不然古語云傷寒下不厭遲時疫下不厭早誠哉斯言也小便不利時疫初起在表時頭痛發熱小便不利者熱入膀胱也益元散主之四苓散豬苓湯皆可用東垣云小便不利而渴者熱在上焦法當淡滲小便不利而不渴者熱在下焦法當苦寒此可為據時疫傳裡大便閉而小便不利者當先通大便大便通小便自利此惟時疫為然他病則否時疫屢經汗下小便不利者陰竭也為難治知母黃柏生地麥冬之類治之或生脈六味皆可然多至少腹如鼓而不救也凡小便不利日久下關不通必反於上往往有嘔吐厄逆涓滴不能下咽至湯藥不進者當用敷臍法大田螺一枚搗爛入麝香三釐敷臍上帛束之即通一見點滴即受湯藥古法有用蔥尉及井底泥敷少腹者俱可參用但不宜於陰竭之虛人耳小便黃赤黑時疫未傳變時小便多如常熱一傳入里則黃熱甚則赤熱入血分蓄血則黑小便可驗裡熱之有無深淺多寡但不可以作專證疫邪在表小便黃即於解表中加清涼藥邪入里小便黃赤雖手足逆冷亦當攻裡逐熱疫邪已退表裡俱和小便黃赤未退仍當清利餘邪惟小便黑者當逐瘀清熱為主犀角地黃湯加大黃等類有屢經汗下清涼太過表裡俱無熱邪而滑瀉腹痛小便黃赤者當理脾升陽為主亦治藥非治病也小便多時疫為濕熱小便多者甚少傳裡之後或有小便多者乃胃土變為燥熱也急下之屢經下後小便多者氣虛也益氣升陽為主亦有腎虛而小便多者六味地黃湯加五味子大抵未下之先小便多者屬燥熱小便必微黃必煩熱渴而喜飲既下之後小便多者屬虛氣虛則不喜飲而寸脈不及尺浮不及沉陰虛則喜飲而尺脈不及寸沉不及浮失治日久則變消渴時疫小便多者如此若夫風寒小便多則屬陽虛不在此例遺尿時疫初起遺尿者多屬三陽合病蓋邪入於陽則陽實而陰虛熱盛於表里為之不守又神昏於上不自知其下部之出入故遺尿也合之腹滿身重口不仁而面垢譫語仲景獨主白虎湯此證不可下以邪全盛在表在經下之則表邪內陷故額上少汗手足逆冷尤不可汗以邪本屬熱汗之則愈增其熱故心憒憒反作譫語惟以白虎湯清其浮越之熱若別兼燥結鞕痛者可於本湯內加大黃下之囊縮時疫囊縮乃熱入於厥陰也有結有熱則下有熱無結則清熱退而囊自縱矣陰證囊縮與時疫頗相類以陰證囊縮必身冷厥逆脈沉時疫囊縮亦身冷厥逆脈沉也然一寒一熱自有不同陰證囊縮陰莖萎縮或全縮入腹有如婦人時疫熱厥囊縮陰莖如常再以兼證辨之陰證囊縮小便清少腹牽引作痛而不滿喜溫按多自利神清不煩時疫囊縮小便赤少腹滿而硬痛拒按大便祕煩而神昏多言時疫多言者譫語之漸也疫熱蒸心之所致治同譫語譫語譫語者熱蒸心也時疫一見譫語即當清熱然有經熱蒸心而譫語者邪在三陽表證多有之脈浮大頭痛發熱舌白者是吳氏三消飲最當六神通解散九味羌活湯防風通聖散白虎湯梔子豉湯皆可選用有膈熱蒸心而譫語者脈洪身熱汗出不惡寒反惡熱胸中無結者是白虎湯黃芩湯選用有痰涎搏結其熱聚於中上二焦而譫語者脈弦滑胸痛及心下痛拒按者是小陷胸湯大柴胡湯選用有胃熱蒸心而譫語者脈滑實大舌黃及黑及燥及芒刺腹滿拒按者是三承氣湯選用輕者只用平胃散加山楂麥芽蘿蔔子即效有熱入血分而蓄血血熱蒸心而譫語者脈沉結或澀心下至少腹凡有痛處拒按而軟者是犀角地黃湯桃仁承氣湯抵當湯選用有熱入小腸膀胱蓄水之熱上蒸心而譫語者脈浮數少腹滿小便不利者是四苓散豬苓湯益元散選用以上皆實證譫語也至若屢經汗下清理二便已清利胸腹無阻滯六脈虛散結代微弱而譫語者陰陽兩虛神無所倚也虛在上焦必心悸神倦生脈散加棗仁天王補心丹虛在中焦必面色萎黃四肢倦怠歸脾湯虛在下焦必耳聾目直視六味地黃湯加遠志五味龍骨茯神狂時疫發狂者譫語之甚者也亦疫熱蒸心之所致治同譫語善忘時疫善忘者蓄血之所致也蓄血在上焦其脈芤胸前及心下必痛必拒按而軟犀角地黃湯主之蓄血在中焦其脈或芤或弦或澀兩脅及臍上必有痛處拒按而軟桃仁承氣湯主之蓄血在下焦其脈多沉結臍下必有痛處拒按而軟抵當湯主之善忘雖為蓄血主證然必驗之大小便屎雖鞕大便反易其色必黑小便自利方為蓄血之的證否則仍當參之多言譫狂諸法治之昏沉時疫昏沉熱入至深極險證也蓋熱初蒸及心之經則心神不安多夢囈醒時自清蒸心之經漸深則心神漸煩多言所言皆日用當行之事無糊塗語蒸及心包則精神間有昏處多言間有糊塗語猶清白語居多逮蒸心包漸深則心神昏處居多言多妄見妄聞甚至疑鬼疑神非人所見聞者猶省人語也至熱直入心臟則昏沉全不省人事矣此熱入淺深之次第見證輕重之辨也所以多言譫語熱之浮淺者梔芩知膏可解發狂熱之深結者硝黃可解至昏沉熱之至深者非犀角黃連羚羊角牛黃莫能解也昏沉雖系熱深更有夾痰氣夾胃結夾血結之分胸滿舌白系夾痰氣當加川貝栝蔞半夏萊蔔子於犀連諸藥中舌黃及燥黑腹滿硬痛者當加犀連於三承氣湯中痛而軟者蓄血加桃仁丹皮赤芍於犀連藥中治昏沉之大法備矣以上皆實證更有虛證亦所當知屢經汗下清利之後表裡無熱胸腹無阻二便自利而神情由倦而漸昏由昏而漸沉乃大虛之危證大劑生脈散加桂附耆朮苓芍急救其陰陽亦不逮矣循衣摸床撮空時疫循衣摸床撮空者熱盛神昏而四肢實也當察其舌舌苔白或無苔有熱無結也犀角黃連石膏為主舌有燥苔或黃黑燥裂芒刺有熱有結也大黃芒硝為主屢經汗下後胸脅仍有拒痛者邪未盡也仍宜清利無拒痛者陰虛而陽亢也生地麥冬棗仁茯神安神為主多睡時疫初起多睡兼身重者熱邪阻滯其經脈也有汗白虎湯無汗或加麻黃屢經汗下後表裡熱愈甚二便俱利而身痛多睡者陰傷也四物六味生脈三方合用大劑養陰方效失治即危服此數劑身痛已和表裡熱退而仍多睡者於三方中加生棗仁即愈若夫平素脾虛多睡多痰嗜睡者一受疫證必更嗜睡當於時疫藥中參之以理脾消痰之品身冷諸病身冷皆屬陰證在時疫多屬熱證須從氣色神脈舌苔中辨其端倪果系時疫則當分初中末以治之不可紊也時疫初起往往有身冷自利腹痛作嘔全似陰證者若舌有厚白苔身有穢氣心煩多汗面色油垢小便黃短數有一二證現便是疫邪直入太陰先里後表非真陰寒證兼嘔利藿香正氣散四苓散無嘔利達原飲服一二劑後即發熱矣時疫傳變發熱之後譫妄昏沉舌燥腹滿便祕而身冷者先表后里證三承氣大柴胡選用無結證者白虎湯時疫末路屢經汗下表裡無邪胸腹無滯二便自和而身冷者當以脈為主脈虛細不振者用藥太過而成脫證也急宜溫補少緩即死生脈散加耆朮苓芍平補陰陽冷甚者加熟附子時疫身冷一證最難下手初起時若寒熱不辨且勿妄投湯劑當少待之多則一二日少則半日多有自行傳變即發熱煩渴者此時則易於用藥若已經發熱傳變之後變為身冷則自有口燥舌乾不得臥諸證在此時藥不可緩緩則熱深厥深雖下後厥回往往亡陰而死身冷與惡寒不同而病機頗同當與惡寒條參看厄逆時疫厄逆與傷寒不同傷寒厄逆虛實寒熱俱有時疫厄逆惟熱結下焦而已凡見厄逆即當下之下之不止按其臍腹有硬痛拒按處仍當下之有下至十數次方止者總之逐盡結熱腸胃通達其厄自止慎不可用丁香柿蒂湯治厄而遺結熱致成危證也吐蛔傷寒吐蛔多寒熱錯雜時疫吐蛔則有熱無寒治此證之當汗當清當下一以傳變之大勢為主惟加烏梅黃連以安之慎勿用烏梅丸中諸辛熱藥致成危篤也
