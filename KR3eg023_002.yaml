body:
  text: 卷之一一辨氣風寒氣從外收斂入內病無臭氣觸人間有作臭氣者必待數日轉陽明腑證之時亦只作腐氣不作屍氣瘟疫氣從中蒸達於外病即有臭氣觸人輕則盈於床帳重則蒸然一室且專作屍氣不作腐氣以人身臟腑氣血津液得生氣則香得敗氣則臭瘟疫敗氣也人受之自臟腑蒸出於肌表氣血津液逢蒸而敗因敗而溢溢出有盛衰充塞有遠近也五行原各有臭氣木臊金腥心焦脾香腎腐以臭得其正皆可指而名之若瘟疫乃天地之雜氣非臊非腥非焦非腐其觸人不可名狀非鼻觀精者不能辨之試察廁間糞氣與凶地屍氣自判然矣辨之既明治之毋惑知為瘟疫而非傷寒則凡於頭痛發熱諸表證不得誤用辛溫發散於諸里證當清當下者亦不得遲迴瞻顧矣二辨色風寒主收斂斂則急面色多繃急而光潔瘟疫主蒸散散則緩面色多鬆緩而垢晦人受蒸氣則津液上溢於面頭目之間多垢滯或如油膩或如煙燻望之可憎者皆瘟疫之色也一見此色雖頭痛發熱不宜輕用辛熱發散一見舌黃煩渴諸里證即宜攻下不可拘於下不厭遲之說三辨舌風寒在表舌多無苔即有白苔亦薄而滑漸傳入里方由白而黃由黃而燥由燥而黑瘟疫一見頭痛發熱舌上即有白苔且厚而不滑或色兼淡黃或粗如積粉若傳經入胃則兼二三色又有白苔即燥與至黑不燥者大抵疫邪入胃舌苔頗類風寒以兼濕之故而不作燥耳惟在表時舌苔白厚異於傷寒能辨於在表時不用辛溫發散入里時而用清涼攻下斯得矣四辨神風寒之邪傷人令人心知所苦而神自清如頭痛作寒熱之類皆自知之至傳裡入胃始神昏譫語緣風寒為天地正氣人氣與之乖忤而後成邪故其氣不昏人神情也瘟疫初起令人神情異常而不知所苦大概煩躁者居多或如癡如醉擾亂驚悸及問其何所苦則不自知即間有神清而能自主者亦多夢寐不安閉目即有所見有所見即譫妄之根緣瘟疫為天地邪氣中人人病中物物傷故其氣專昏人神情也五辨脈瘟疫之脈傳變後與風寒頗同初起時與風寒迥別風寒從皮毛而入一二日脈多浮或兼緊兼緩兼洪而皆浮迨傳入里始不見浮脈其至數亦清楚而不模糊瘟疫從中道而變自里出表一二日脈多沉迨自里出表脈始不沉乃不浮不沉而數或兼弦兼大而皆不浮其至數則模糊而不清楚其初起脈沉遲勿作陰寒斷沉者邪在裡也遲者邪在陰分也脈象同於陰寒而氣色舌苔神情依前諸法辨之自不同於陰寒或數而無力亦勿作虛視緣熱蒸氣散脈不能鼓指但當解熱不宜補氣受病之因有不同故同脈而異斷也辨時行疫癘與風寒異氣風主疏泄寒主凝泣二氣雖有不同然皆冷而不熱其中人也鬱而不宣方其初受在表均宜溫散麻黃湯桂枝湯芎蘇十神神術等方皆散寒之劑非解熱之劑時行之氣屬濕溫二氣合成熱而不冷其中人也立蒸而腐敗方其初傳在表即宜涼解大青龍湯六神通解散九味羌活湯葳蕤湯大羌活湯人參敗毒散皆解熱之劑非散寒之劑也以解熱之劑治風寒輕則寒中嘔利重則厥逆亡陽以散寒之劑治瘟疫輕則衄渴譫妄重則枯竭亡陰此氣之不可不辨也辨時行疫癘與風寒異受風寒從表入里自皮毛而肌肉而筋脈而胸膈而腸胃一層漸深一層不能越此而入彼故汗不厭早下不厭遲為和為解淺深毫不可紊以其氣皆屬冷一層收斂入一層必待寒化為熱邪斂入內方可攻下涼解否則邪未入里預用攻利涼解虛其裡氣反引表邪內陷而成結胸痞利諸險證也時症從口鼻而入先中中焦後變九傳其傳自里出表雖出表而里未必全無邪留經過之半表未必全無邪干故下不厭早汗不厭遲為和為解淺深必不可拘以其氣皆屬熱熱能作蒸不必郁變而此蒸即帶彼熱當其未出表時強欲溫表在始則引毒熱成燎原之勢為斑衄狂喘諸凶在末則傷真陰為枯槁沉昏厥逆諸危也辨傳經溫疫傳經與風寒不同風寒從表入里故必從太陽而陽明而少陽而入胃若溫疫則邪從中道而出表入里惟視人何經本氣之強弱為傳變故吳又可曰疫邪有先表后里者有先里後表者有但表不里者有但里不表者有表勝於里者有里勝於表者二句吳又可本作有表裡偏勝者一句有表而再表者有里而再里者有表裡分傳者此為九傳愚按所謂表者發熱惡寒頭痛頭眩項強背痛腰疼腿膝足脛痠痛自汗無汗及頭腫面腫耳目赤腫項腫發斑發疹皆是所謂里者渴嘔胸滿腹滿腹痛脅滿脅痛大便不通大便泄瀉小便不通小便黃赤澀痛及煩躁譫妄沉昏舌燥舌卷舌強口咽赤爛皆是在風寒從表入里里證必待漸次閉鬱而成故見表證不必兼見里證且入里之後表多自解故見里證之後不必復見表證若溫疫本從中道而出表故見表證時未有不兼一二里證者且未有不兼見一二半表裡之少陽證者仲景所云陽明少陽合病必自下利三陽合病脈浮大上關上但欲眠睡目合則汗三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿皆指瘟疫言非指風寒言也且瘟疫屬蒸氣出表入里原自不常有入里下之而餘邪不盡仍可出表者嘗見譫妄昏沉之後病愈數日復見頭疼發熱復從汗解者此所謂表而再表風寒必無是也更有下證全具用承氣湯後裡氣通而表亦達頭痛發熱得汗而解移時復見舌黑胸滿腹痛譫妄仍待大下而後愈者此所謂里而再里風寒必無是也若夫表裡分傳之證風寒十無一二疫證十有六七但據傳經之專雜以辨之一經專見一經證者多風寒一經雜見二三經證者多疫證日久漸轉屬者多風寒一日驟傳一二經或二三經者多疫證則雖病有變態而風寒不混於疫證疫證不混於風寒施治自無訛誤矣至若辨氣辨色辨舌辨神俱已清楚而投之以治疫之藥復有不效者則以時疫有獨發有兼夾他證之故是以辨時疫異於他證矣至挾他證者則此人時疫與彼人時疫又有不同尤當細辨其兼證凡五種夾證凡十種詳列於後兼寒其一有兼寒者初起一二日頭痛發熱身痛惡寒諸表證悉與時疫同而以脈辨則不同時疫多軟散而不浮兼寒則多浮數浮弦浮大甚至有浮緊者再以證辨亦微有不同時疫多汗兼寒則無汗為異亦異於單受寒者單受寒無煩躁口苦口臭證時疫兼寒必有煩躁口苦口臭證也一遇此等更當辨其受寒與時疫孰輕孰重疫重寒輕者煩躁證多無汗惡寒證少則當以敗毒散加知母石膏或達原飲加羌防柴葛或六神通解散尤捷寒重疫輕者惡寒無汗證必甚煩躁必輕則只用敗毒散其寒束於外無汗惡寒尤甚疫鬱於內煩躁更甚者冬月大青龍湯可借用余月九味羌活湯最為的當此證若治寒遺疫必有斑黃狂衄之變治疫遺寒復有厥逆嘔利胸腹痞滿之憂馴至沉困者不少不可不知然此皆為初起一二日言也若日久則邪疫勃發表寒不能自存而變為熱則惟以治疫之法治之而已兼風其一有兼風者初起一二日表證與時疫悉同惟鼻塞鼻鳴嚏噴咳嗽與時疫略異脈亦多浮而與時疫之不浮不沉而數者微異治法不大相遠即於時疫諸方中加荊防咳加前胡杏仁蘇子而已大抵時疫兼寒能令病勢增重兼風反令病勢易解以寒主凝泣則疫邪內郁郁一分病勢增痼一分風主遊揚則疫邪外疏疏一分病勢解散一分泣同澀兼暑時疫兼寒兼風四時皆有至若兼暑一證惟長夏有之初起一二日與時疫無異只胸滿嘔利為異而脈則兼弦細芤遲不似時疫不浮不沉而數治法於時疫諸方中微減發表之味如用羌即不用獨用柴即不用前蓋時疫多汗暑證更多汗兩邪逼出表汗則表必虛故發表之味不可重複也寒潤之藥尤宜減清熱之味亦宜減以邪從表出鬱熱必輕過用清涼恐致寒中而增嘔脹泄利況表氣太泄裡氣必虛易犯厥脫之證故清涼寒潤不可太多也最宜加用分利燥脾之品木通為上滑石次之豬苓赤茯澤瀉又次之蓋分利則暑與疫皆從清道而出邪有去路正不必徒以寒涼逆折取效也間有表見身痛宜用香薷里見腹滿宜用蒼朮者再時疫兼暑則病勢反緩以疫中瘟氣屬亢陽暑為陽中之陰陽得陰則解雖不能盡解然得一分陰氣則和一分亢陽每見時疫兼暑其譫妄舌燥諸證反緩者職此故也兼瘧時疫有似瘧有轉瘧有兼瘧之不同用藥亦有微異似瘧者寒熱往來或一日二三次或一次而時無定也時疫初起多有之轉瘧者時疫譫妄煩渴大劇之後已經大汗大下仍有餘邪不解復作寒熱轉成瘧象也時疫末路多有之兼瘧之證乃寒暑時疫合病也其證寒熱有常期瘧證全具但熱多寒少且多燥渴擾亂熱勢迅速神情昏憒穢氣觸人為異秋令多有之時疫所以似瘧者因邪氣盤錯於募原欲出表而不能透達欲陷里而未得空隙故見半表半裡之少陽證也治法宜達原飲加柴胡為主時疫所以轉瘧者因汗下後邪氣已衰正氣來復邪正相爭故在先陽氣獨亢有熱無寒者今則以陰液漸回而寒熱相爭矣在先邪氣秉綱晝夜燥熱無休止時者今則邪氣漸退正氣漸復而寒熱發作有時矣治法以養正為主去邪佐之小柴胡湯炙甘草湯柴胡四物湯參胡三白湯量餘邪之盛衰視陰陽之盈虧酌而用之至若兼瘧之證最為難治吳又可曰瘧疾二三發或七八發後忽然晝夜煩熱發渴不惡寒舌上苔刺心腹痞滿飲食不進下症漸具此時疫證見瘧疾證隱也以疫證方藥治之則生瘧家方藥治之則劇治之如法脈靜身涼每日或間日寒熱復作有常期者時疫解而瘧邪未盡也仍以瘧法治之愚按時疫與瘧病不甚相遠疫乃濕溫二氣合病瘧乃風寒暑濕四氣合病其邪氣雜而不純相類瘧邪橫連募原時疫亦發於募原其受邪之處相類但時疫之溫氣發則為亢陽故宜下宜清之證多瘧之暑氣停則為鬱滯故宜宣利之證多耳所以時疫初起方用達原飲與瘧之主方用清脾飲藥品亦多相類至其傳變則緩急輕重迥乎不同也善悟者於此處細參思過半矣兼痢時疫本多自利證表證初起即每日解數次稀臭水者是也詳見後自利條下更有春夏之交得時疫即兼下利紅白而裡急後重者名為疫痢初起慎不可從痢治蓋痢屬裡證今兼疫邪之發熱頭痛為表裡俱病先用治疫之法解其表表解而里自和其痢多有不治自愈者若用治痢之法先清其里裡氣虛而表邪陷輕者增其煩躁沉困重者遂至嘔逆昏憒而危矣所以古人於疫痢初起專主倉廩湯其方乃人參敗毒散一意解表但加陳倉米以和中養脾胃俟表證解後裡熱證具方可議清議下不但香連芍藥承氣之類宜緩即淡滲分利之劑亦宜緩投於表證未解之先也若太陽證不見而微見少陽陽明證者則柴葛五苓散不妨借用痢證夾表不可清裡不特時疫兼證為然凡一切痢證微兼身熱即宜慎用苦寒淡滲用之若早必增嘔逆此歷驗不爽者疫證兼利其熱勢反多緩亦由痢為暑氣陽中之陰能和亢陽且鬱蒸之熱有所疏泄故也若疫毒太甚驟發即下純紅純紫惡血或兼見舌煩譫妄諸惡證者黃連大黃又在急用不可拘此論矣以上五條其辨明所以為瘟疫兼證固己不憚逐類詳審然總以前所備具氣色舌神脈五辨為主五者之中必有一二確據方於疫門求治否則各按各門施治可也若混以時疫治之為害甚矣夾痰水飲入於胃經蒸變而稠濁者為痰未經蒸變而清稀者為水痰與水一物也痰能作熱水能作冷時疫屬熱證故夾痰者更增其熱脈證治法無甚參差但於治疫藥中加栝蔞貝母甚則加牛黃夾水者脈證往往相悖治法則有不同不可不細辨也時疫之脈必數而夾水在胸膈其脈多緩甚則遲弦此脈夾水之辨也時疫之舌一經傳裡即轉黃轉燥轉黑若有水在胸膈則煩躁譫妄沉昏諸證備具而舌色白潤間有轉黃黑者亦必仍有白苔或滿舌黃黑半邊夾一二條白色或舌尖舌本俱黃中夾一段白色此舌夾水之辨也時疫胸滿心下硬痛手不可按一有水在胸膈心下雖滿痛按之則軟略加揉按則漉漉有聲此證夾水之辨也時疫見夾水脈證雖有表不宜純用辛涼發散純用辛涼則表必不解而轉見沉困有里證不可遽用苦寒早用苦寒必轉加昏憒此水氣鬱遏熱邪陽氣受困宜於發表清裡藥中加辛燥利氣利水之品以去水氣迨水氣去郁遏發然後議攻議涼則無不效者矣燥濕則半夏蒼朮利水則木通苓澤利氣則萊菔草果木香甚至有須用大戟芫花者在時疫雖屬熱邪往往有投三承氣黃芩白虎而不效偶用溫暖藥收功者遂相訟清熱之非不知熱邪乃其本氣夾雜乃其間氣也夾食時疫夾食者最多而有食填膈上食入腸胃之不同入腸胃則為陽明諸熱證治法備於三承氣湯惟食填胸膈往往有脈沉手足冷者誤認三陰投以溫劑亦無一毫熱渴發見但煩躁倍增甚則一二日即死蓋胸中乃陰陽升降之路食填之則氣閉氣閉則熱鬱於下而無所疏泄誤溫則熱愈郁熱鬱於內故外無發熱證熱鬱於下故上無口渴證疫熱以出表為輕入里為重在淺為輕入深為重此證一溫則逼邪入里入深以致速死而無熱證也如氣色神舌脈辨得為疫證矣而遇脈沉手足冷即當細詢其胸膈若痞塞悶滿即是夾食再辨其舌苔白厚而微兼淡黃益為食填膈上之明驗於治疫藥中加枳桔青皮萊菔麴櫱甚則用吐法以宣之使膈開而陽氣宣達然後熱證自見當解表當清裡自無誤治矣夾郁時疫夾氣鬱者初起疫證悉同而多脈沉手足冷嘔逆胸滿頗類夾食但夾食為有物為實邪舌苔厚白而微黃胸膈滿痛不可按而亦不移夾氣為無物為虛邪舌苔白薄胸膈滿痛串動而可按宜先宣通其鬱然後解表清裡自無不效若不舒鬱而徒發表則裡氣不能外達而難於徹汗遽用清下則上氣不宣多致痞逆惟於解表藥中加蘇梗木香大腹皮香附等類以宣其氣則表易解於清裡藥中加川貝母以舒其鬱則里易和貝母為舒郁要藥但力性緩必用至五錢一兩方能奏效夾血時疫傳裡之後蓄血最多治從攻裡茲不具論惟本有內傷停瘀復感時疫於初起一二日疫之表證悉具而脈或芤或澀頗類陽證陰脈但須細詢其胸腹脅肋四肢有痛不可按而濡者即為蓄血確驗其芤澀非陽證見陰脈乃表證見里脈也治法必兼消瘀紅花桃仁歸尾赤芍元胡之類量加一二味表邪方易解澀芤之脈方易起若誤認芤澀為陰脈而投溫劑輕者變劇重者危矣夾脾虛時疫較之風寒本為難治以風寒傳變有次序時疫傳變無常經風寒表邪一發即散時疫散而復集且往往復之再三風寒傳裡證一攻即和時疫攻而復合有下至一二十次者此時疫之難治也而脾虛者更為難治蓋時疫必得汗下而後解脾虛者表不能作汗里不任攻下或得汗矣而氣隨汗脫得下矣而氣從下脫治此等證汗勿強汗發表必兼養正人參敗毒散是也下勿輕下攻裡必兼固氣生津液黃龍湯是也其外證無大分別惟脈不任尋按然邪有進退當其邪進方張之時脈亦有尋按有力者不可泥也必合氣色神情脈證以相參如面色萎黃神情倦怠氣息微促及心悸耳鳴皆脾虛中氣不振之象更須通體合參如通體皆見有餘實象而獨見一二虛象則虛象反為吃緊通體見虛象而獨見一二實證則實證又為吃緊總須權衡標本凡證之屬表屬上焦屬六腑者皆為標證之屬裡屬中焦下焦屬五臟皆為本若實證居標虛證居本則虛證為重虛證居標實證居本則實證為重到此虛實關頭必著意參詳庶幾無失夾腎虛時疫夾脾虛者為難治矣夾腎虛者更難時疫屬熱證腎氣虛則手足冷時疫屬實邪腎氣虛則眩暈驚悸腰膝萎軟腎虛之中又有陰虛陽虛之分時疫必待汗下清而後解陽虛者一經汗下清則脫絕之證隨見陰虛者一經汗下則枯竭之證隨見必須時時諦察凡在表時見腰痛異常小便頻數膝脛冷軟其人平日非有淋濁陽萎即系遺泄好內須詢明於通表藥中加人參白芍陽虛兼杜仲陰虛兼知母以照顧腎氣免後來意外之變若入里當下必以陶氏黃龍湯為主當清必以人參白虎湯為主或屢清屢下而熱更甚舌上燥而無苔或有黑苔愈清而愈長或有燥苔愈下而愈燥此皆腎虛之證察其陽明無實邪可據當從腎虛治以六味地黃湯易生地加知柏王太僕所謂寒之不寒責以無水壯水之主以制陽光者此也或仍不應則合生脈散以滋水之上源或用四物湯流通經絡似此熱勢燎原非杯水所能救必大作湯液藥味必以兩計湯液必以鬥計乃有濟耳見幾若早十救二三涸竭已見十難救一或更兼脾胃敗證如嘔呃噦利之類湯藥不下百難救一矣夾亡血疫證亡血有三其一未病之先素亡血而陰虛一受疫則邪熱乘虛煎熬亡陰最易解表清裡用藥必步步照顧榮血如九味羌活湯之用生地人參敗毒散之用人參是也其二當受病之時忽然吐衄女子崩漏甚至血暈昏厥勢甚危急亦疫證常有也病家但知血之可駭往往不知受疫醫家亦忽其客邪惟汲汲於止血清涼滋補多至危殆不知血由疫逼惟當治疫疫邪解而血自止此證不遽見於疫在表時而見於發熱數日之後人猶易知惟疫鬱於陰經而暴見此證者難識以其證外無頭痛發熱之可據耳但見微惡寒而大作嘔急當視其氣色神脈舌苔若舌有白苔氣色有一二疫象即是疫毒無疑以達原飲為主嘔加藿香脹加青皮但治疫毒血證自已若脫血太甚而氣欲絕者加人參以固中氣俟疫證傳變歸經然後按經治之此疫證兼血之最危者其三疫邪大張之後煩熱燥渴之餘而見亡血證則又瘟疫常態詳後血證各條夾疝疫邪夾疝其腎囊少腹引痛全是疝證當照辨氣色神脈舌苔法辨之一有疫邪不必治疝但治疫而疝自消若依常治疝法用吳萸桂附茴香諸燥品輕者變為囊癰重者變為呃逆噦厥沉昏而莫救矣夾心胃痛時疫有兼心胃痛者於其痛時察其氣色神脈舌苔若有一於時疫但治時疫雖平時因寒而發此則惟治其熱蓋以疫邪客於募原傳於太陰而發心胃痛之痼疾於達原飲中加木香蒼朮以開通郁疫使其透發於表而痛自已若誤認平常心胃痛用桂附薑萸必致危殆夾哮喘哮喘乃肺家素有痰火一受疫邪其濕熱之氣從其類而入肺發其哮喘遇此當察其氣色神脈舌苔有疫但治疫其哮喘自除於治疫藥中加貝母栝蔞淡豉桑皮疫邪哮喘並解法更精密以上諸條凡言兼者疫邪兼他邪二邪自外入者也凡言夾者疫邪夾內病內外夾發者也二邪兼發以疫為重他邪為輕故略兼治他邪而病即解二邪夾發如夾水食血氣痰等實邪則以夾邪為先疫邪為後蓋清其夾邪而疫毒始得透達透達方能傳變傳變方能解利也如夾脾虛腎虛亡血諸虛證則以治邪為主養正為輔蓋疫邪最易傷正故不可養正遺邪也如夾疝哮心胃痛諸舊病則但治疫邪舊病自已蓋舊病乃新邪所迫而發也
